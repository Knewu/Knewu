<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>우리 게임랜드 🎪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --paper:#FFFDF7; --ink:#33302E; --line:3px solid var(--ink);
  --coral:#FF6B6B; --sun:#FFC531; --mint:#4FC978; --sky:#4D96FF; --lilac:#8B7CF6;
  --shadow:4px 4px 0 var(--ink);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;
  background-image:radial-gradient(#efe9dc 1.5px, transparent 1.5px);background-size:22px 22px}
.wrap{max-width:480px;margin:0 auto;padding:16px 16px 40px}
h1,h2,.jua{font-family:'Jua',sans-serif;font-weight:400}
.screen{display:none}.screen.on{display:block}
.card{background:#fff;border:var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.btn{display:block;width:100%;padding:16px;border:var(--line);border-radius:16px;box-shadow:var(--shadow);
  font-family:'Jua',sans-serif;font-size:20px;color:var(--ink);background:#fff;cursor:pointer;transition:transform .08s}
.btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink)}
.btn.coral{background:var(--coral);color:#fff}.btn.sun{background:var(--sun)}
.btn.mint{background:var(--mint);color:#fff}.btn.sky{background:var(--sky);color:#fff}
.btn.lilac{background:var(--lilac);color:#fff}
.btn.sm{font-size:16px;padding:11px;box-shadow:3px 3px 0 var(--ink)}
.btn[disabled]{opacity:.45;pointer-events:none}
input[type=text],input[type=password],input[type=number],textarea{
  width:100%;padding:13px;border:var(--line);border-radius:12px;font-family:'Pretendard';font-size:17px;background:#fff}
textarea{resize:none}
.title{font-size:38px;text-align:center;margin:26px 0 4px;letter-spacing:1px}
.subtitle{text-align:center;font-size:15px;color:#8a8378;margin-bottom:24px}
.badge{display:inline-block;font-family:'Jua';font-size:13px;background:var(--sun);border:2px solid var(--ink);
  border-radius:999px;padding:3px 12px}
.row{display:flex;gap:10px}.row>*{flex:1}
.center{text-align:center}
/* 답 버튼 (퀴즈) */
.ansGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.ans{border:var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px 10px;text-align:center;
  cursor:pointer;color:#fff;transition:transform .08s;min-height:110px;display:flex;flex-direction:column;
  justify-content:center;gap:6px}
.ans:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink)}
.ans .shape{font-size:34px;line-height:1}
.ans .txt{font-family:'Jua';font-size:18px;word-break:keep-all}
.ans.c0{background:var(--coral)}.ans.c1{background:var(--sun);color:var(--ink)}
.ans.c2{background:var(--mint)}.ans.c3{background:var(--sky)}
.ans.picked{outline:5px solid var(--ink);outline-offset:-2px;transform:scale(.97)}
.ans.dim{opacity:.35;pointer-events:none}
/* 타이머 */
.timerBar{height:16px;border:var(--line);border-radius:999px;background:#fff;overflow:hidden;margin:12px 0}
.timerFill{height:100%;background:var(--mint);width:100%;transition:width .25s linear}
.timerFill.hurry{background:var(--coral)}
.bigTime{font-family:'Jua';font-size:24px;text-align:center}
/* 점수판 */
.rank{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:2px dashed #e5decf}
.rank:last-child{border-bottom:none}
.rank .no{font-family:'Jua';font-size:20px;width:34px;text-align:center}
.rank .nm{flex:1;font-size:17px;font-weight:600}
.rank .sc{font-family:'Jua';font-size:19px}
.rank.me{background:#FFF6D8;border-radius:10px}
.gain{color:var(--mint);font-weight:700;font-size:14px;margin-left:6px}
/* 포디움 */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:18px 0}
.pod{flex:1;text-align:center}
.pod .box{border:var(--line);border-radius:14px 14px 0 0;box-shadow:var(--shadow);
  display:flex;flex-direction:column;justify-content:flex-end;padding:8px 4px;font-family:'Jua'}
.pod .who{font-size:15px;margin-bottom:8px;word-break:keep-all}
.pod .medal{font-size:30px}
.pod1 .box{height:120px;background:var(--sun)}
.pod2 .box{height:90px;background:#C9C9C9}
.pod3 .box{height:70px;background:#E0A96D}
/* 호스트 */
.qItem{border:2px solid var(--ink);border-radius:12px;padding:10px 12px;margin-bottom:8px;background:#fff;
  display:flex;align-items:center;gap:8px}
.qItem .qt{flex:1;font-size:15px;word-break:keep-all}
.qItem .del{border:2px solid var(--ink);background:#fff;border-radius:8px;padding:4px 8px;cursor:pointer;font-size:13px}
.optRow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.optRow input[type=text]{flex:1}
.optRow .mark{width:44px;height:44px;border:var(--line);border-radius:10px;background:#fff;cursor:pointer;
  font-size:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.optRow .mark.on{background:var(--mint);color:#fff}
.tabBtns{display:flex;gap:8px;margin-bottom:14px}
.tabBtns .tb{flex:1;padding:10px;border:var(--line);border-radius:12px;background:#fff;font-family:'Jua';
  font-size:16px;cursor:pointer;box-shadow:3px 3px 0 var(--ink)}
.tabBtns .tb.on{background:var(--ink);color:#fff}
.pill{display:flex;gap:8px}
.pill .p{flex:1;padding:10px;border:var(--line);border-radius:12px;text-align:center;font-family:'Jua';
  cursor:pointer;background:#fff}
.pill .p.on{background:var(--sky);color:#fff}
.muted{color:#8a8378;font-size:13px}
.playerChip{display:inline-block;border:2px solid var(--ink);background:#fff;border-radius:999px;
  padding:5px 12px;margin:3px;font-size:14px}
/* 게임 선택 카드 */
.gameSel{border:var(--line);border-radius:18px;box-shadow:var(--shadow);background:#fff;
  padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .08s}
.gameSel:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink)}
.gameSel .ico{font-size:36px}
.gameSel .gname{font-family:'Jua';font-size:20px}
.gameSel .gdesc{font-size:13px;color:#8a8378}
.gameSel[data-off="1"]{opacity:.45;pointer-events:none}
/* 그림판 */
.canvasBox{border:var(--line);border-radius:14px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
canvas{display:block;width:100%;touch-action:none}
.paint{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.dot{width:38px;height:38px;border-radius:50%;border:3px solid var(--ink);cursor:pointer;flex-shrink:0}
.dot.on{outline:4px solid var(--sun);outline-offset:2px}
.toolBtn{border:var(--line);border-radius:10px;background:#fff;padding:8px 12px;font-size:14px;cursor:pointer;
  font-family:'Jua'}
.wordBanner{font-family:'Jua';font-size:22px;text-align:center;background:var(--sun);border:var(--line);
  border-radius:14px;box-shadow:var(--shadow);padding:12px;margin-bottom:12px}
/* 채팅/추측 피드 */
.guessRow{display:flex;gap:8px;margin-top:10px}
.guessRow input{flex:1}
.guessRow button{border:var(--line);border-radius:12px;background:var(--sky);color:#fff;font-family:'Jua';
  font-size:17px;padding:0 18px;cursor:pointer;box-shadow:3px 3px 0 var(--ink)}
.feed{margin-top:10px;max-height:160px;overflow-y:auto}
.feedItem{font-size:15px;padding:4px 2px;border-bottom:1px dashed #e5decf}
.feedItem b{font-weight:700}
.choBig{font-family:'Jua';font-size:44px;text-align:center;letter-spacing:8px;margin:8px 0}
/* 컨페티 */
.confetti{position:fixed;top:-40px;font-size:26px;animation:fall linear forwards;pointer-events:none;z-index:99}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.setupWarn{background:#FFF1F0;border:var(--line);border-radius:14px;padding:16px;font-size:14px;line-height:1.6}
code{background:#f3efe6;padding:2px 6px;border-radius:6px;font-size:13px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <div id="scr-setup" class="screen">
    <h1 class="title">⚙️ 설정 필요</h1>
    <div class="setupWarn">
      <code>FIREBASE_CONFIG</code>의 apiKey에 기존 도구에서 쓰던 값을 붙여넣어 주세요.
    </div>
  </div>

  <!-- 🏠 시작 -->
  <div id="scr-home" class="screen">
    <h1 class="title">🎪 우리 게임랜드</h1>
    <p class="subtitle">퀴즈 · 그림 맞추기 · 초성 퀴즈</p>
    <div class="card">
      <input type="text" id="joinName" placeholder="이름을 써 줘요 ✏️" maxlength="10" style="margin-bottom:12px">
      <button class="btn sun" onclick="joinGame()">🙋 참가하기</button>
    </div>
    <button class="btn sm" onclick="openHostLogin()">🎩 호스트 (진행하는 사람)</button>
  </div>

  <!-- 🎩 호스트 로그인 -->
  <div id="scr-hostlogin" class="screen">
    <h2 class="title" style="font-size:28px">🎩 호스트 입장</h2>
    <div class="card">
      <input type="password" id="hostPin" placeholder="PIN 입력" inputmode="numeric" style="margin-bottom:12px">
      <button class="btn lilac" onclick="hostLogin()">입장</button>
    </div>
    <button class="btn sm" onclick="show('home')">← 돌아가기</button>
  </div>

  <!-- 🎩 호스트 콘솔 -->
  <div id="scr-host" class="screen">
    <h2 class="title" style="font-size:26px;margin-bottom:14px">🎩 호스트 콘솔</h2>
    <div class="tabBtns">
      <button class="tb on" id="tabP" onclick="hostTab('p')">▶️ 진행</button>
      <button class="tb" id="tabQ" onclick="hostTab('q')">📝 퀴즈 문제</button>
    </div>

    <!-- 퀴즈 문제 관리 -->
    <div id="host-q" style="display:none">
      <div class="card">
        <div class="pill" style="margin-bottom:12px">
          <div class="p on" id="typeMc" onclick="setQType('mc')">🔢 선택형</div>
          <div class="p" id="typeOx" onclick="setQType('ox')">⭕ OX</div>
        </div>
        <textarea id="qText" rows="2" placeholder="문제를 써 주세요" style="margin-bottom:12px"></textarea>
        <div id="mcOpts">
          <div class="optRow"><button class="mark" onclick="setAns(0)">✔️</button><input type="text" id="opt0" placeholder="보기 1"></div>
          <div class="optRow"><button class="mark" onclick="setAns(1)">✔️</button><input type="text" id="opt1" placeholder="보기 2"></div>
          <div class="optRow"><button class="mark" onclick="setAns(2)">✔️</button><input type="text" id="opt2" placeholder="보기 3 (선택)"></div>
          <div class="optRow"><button class="mark" onclick="setAns(3)">✔️</button><input type="text" id="opt3" placeholder="보기 4 (선택)"></div>
        </div>
        <div id="oxOpts" style="display:none">
          <div class="pill">
            <div class="p" id="oxO" onclick="setAns(0)">⭕ 맞다</div>
            <div class="p" id="oxX" onclick="setAns(1)">❌ 아니다</div>
          </div>
        </div>
        <p class="muted" style="margin:8px 0">✔️를 눌러 정답을 표시해 주세요</p>
        <button class="btn mint sm" onclick="addQuestion()">➕ 문제 추가</button>
      </div>
      <div class="card">
        <h2 style="font-size:18px;margin-bottom:10px">문제 목록 <span class="badge" id="qCount">0개</span></h2>
        <div id="qList"><p class="muted">아직 문제가 없어요</p></div>
      </div>
    </div>

    <!-- 진행 -->
    <div id="host-p">
      <div class="card">
        <h2 style="font-size:18px;margin-bottom:8px">참가자 <span class="badge" id="pCount">0명</span></h2>
        <div id="pList"><p class="muted">아직 아무도 안 왔어요</p></div>
      </div>
      <div id="hostStage"></div>
      <button class="btn sm" onclick="resetGame()" style="background:#fff;margin-top:4px">🧹 게임 초기화 (점수·참가자 리셋)</button>
    </div>
    <button class="btn sm" onclick="show('home')" style="margin-top:10px">← 나가기</button>
  </div>

  <!-- 🙋 참가자 -->
  <div id="scr-play" class="screen">
    <div class="center" style="margin:14px 0">
      <span class="badge" id="myBadge">🙋</span>
    </div>
    <div id="playStage"></div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════
   ⚙️ 설정 — apiKey만 기존 값으로 교체하면 됩니다
═══════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDUFwsNEBzTZxr8EJuY2BZkYTEBadQoMk8",
  authDomain: "knewu-64318.firebaseapp.com",
  databaseURL: "https://knewu-64318-default-rtdb.firebaseio.com",
  projectId: "knewu-64318",
  storageBucket: "knewu-64318.appspot.com",
  messagingSenderId: "301755569133",
  appId: "1:301755569133:web:9bd85133d084c041368de4"
};
const HOST_PIN = "1234";   // 꼭 바꿔서 쓰세요
const ROOM = "quizshow";
/* ═══════════════════════════════════════════════ */

const SHAPES = ["🔴","🔺","🟩","⭐"];
const OX_SHAPES = ["⭕","❌"];
const DRAW_WORDS = ["코끼리","기린","토끼","강아지","고양이","문어","펭귄","공룡","나비","무지개","우산","아이스크림","피자","수박","바나나","김밥","라면","자전거","비행기","로켓","소방차","눈사람","축구공","안경","칫솔","시계","컴퓨터","휴대폰","냉장고","눈사람","유령","마법사","인어","용","해적","로봇","줄넘기","낚시","캠핑","놀이터","미끄럼틀","그네","케이크","햄버거","치킨","딸기","포도","거북이","상어","고래","개미","벌","달팽이","부엉이","독수리","선풍기","텐트","기차","헬리콥터","팽이"];
const CHO_WORDS = ["떡볶이","김치찌개","놀이공원","여름방학","줄넘기","태권도","무지개","소방관","경찰관","우주비행사","아이스크림","눈싸움","물놀이","자전거","삼겹살","붕어빵","솜사탕","비빔밥","불고기","숨바꼭질","술래잡기","보드게임","수수께끼","운동회","급식시간","도서관","놀이터","문방구","젤리","초콜릿","딱지치기","공기놀이","팔씨름","끝말잇기","종이접기","물총싸움","방울토마토","계란말이","떡국","송편"];
const PAINT_COLORS = ["#33302E","#FF6B6B","#4D96FF","#4FC978","#FFC531","#FFFFFF"];

let db=null, me=null, isHost=false, qType='mc', qAnswer=-1;
let questions={}, players={}, state=null, results={}, winInfo=null;
let myAnswered=null, timerInt=null, hostAutoEnded=null;
let strokes={}, curStroke=null, curRef=null, lastSync=0;
let paintColor=PAINT_COLORS[0], paintSize=5;
let feedCache=[];

function $(id){return document.getElementById(id)}
function show(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  $('scr-'+name).classList.add('on');
  window.scrollTo(0,0);
}
function store(k,v){try{localStorage.setItem(k,v)}catch(e){}}
function load(k){try{return localStorage.getItem(k)}catch(e){return null}}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function norm(s){return String(s).replace(/\s+/g,'').toLowerCase()}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

/* 초성 추출 */
const CHO_LIST=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
function toCho(word){
  return [...word].map(ch=>{
    const c=ch.charCodeAt(0)-0xAC00;
    return (c>=0&&c<11172)?CHO_LIST[Math.floor(c/588)]:ch;
  }).join(' ');
}

/* ── 초기화 ── */
(function init(){
  if(FIREBASE_CONFIG.apiKey.includes("붙여넣기")){ show('setup'); return; }
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();

  db.ref(ROOM+'/questions').on('value', s=>{ questions=s.val()||{}; renderQList(); renderHostStage(); });
  db.ref(ROOM+'/players').on('value', s=>{ players=s.val()||{}; renderPlayers(); renderHostStage(); renderScores(); });
  db.ref(ROOM+'/results').on('value', s=>{ results=s.val()||{}; });
  db.ref(ROOM+'/win').on('value', s=>{ winInfo=s.val(); });
  db.ref(ROOM+'/strokes').on('value', s=>{ strokes=s.val()||{}; redrawCanvas(); });
  db.ref(ROOM+'/guesses').on('value', s=>{
    const v=s.val()||{};
    feedCache=Object.values(v).sort((a,b)=>a.at-b.at);
    renderFeed();
  });
  db.ref(ROOM+'/state').on('value', s=>{
    state=s.val()||{phase:'lobby'};
    if(['question','draw','cho'].includes(state.phase)) myAnswered=null;
    hostAutoEnded=null;
    renderHostStage(); renderPlayStage(); syncTimer();
  });

  const pid=load('qz_pid'), nm=load('qz_name');
  if(pid&&nm){
    db.ref(ROOM+'/players/'+pid).once('value',s=>{
      if(s.exists()){ me={id:pid,name:nm}; $('myBadge').textContent='🙋 '+nm; show('play'); renderPlayStage(); }
      else show('home');
    });
  } else show('home');
})();

/* ── 참가 ── */
function joinGame(){
  const name=$('joinName').value.trim();
  if(!name){ $('joinName').classList.add('shake'); setTimeout(()=>$('joinName').classList.remove('shake'),400); return; }
  const ref=db.ref(ROOM+'/players').push();
  ref.set({name, score:0, joinedAt:Date.now()});
  me={id:ref.key, name};
  store('qz_pid',ref.key); store('qz_name',name);
  $('myBadge').textContent='🙋 '+name;
  show('play'); renderPlayStage();
}
function playerArr(){ return Object.entries(players).map(([id,p])=>({id,...p})).sort((a,b)=>a.joinedAt-b.joinedAt) }

/* ═════════ 참가자 화면 ═════════ */
function renderPlayStage(){
  if(!me) return;
  const el=$('playStage'); if(!el) return;
  const ph=state?state.phase:'lobby';

  if(ph==='lobby'){
    el.innerHTML=`<div class="card center">
      <div style="font-size:52px">🍿</div>
      <h2 style="font-size:22px;margin:8px 0">곧 시작해요!</h2>
      <p class="muted">호스트가 게임을 고르고 있어요</p></div>
      <div class="card"><h2 style="font-size:17px;margin-bottom:8px">같이 하는 친구들</h2>
      ${playerArr().map(p=>`<span class="playerChip">${esc(p.name)}</span>`).join('')||'<p class="muted">...</p>'}</div>`;
    return;
  }

  /* ── 퀴즈쇼 ── */
  if(ph==='question'){
    const q=questions[state.qid]; if(!q){el.innerHTML='';return;}

      </div>

  }

      <div class="card center">

          <div class="guessRow">

  if(ph==='cho'){

      <div class="card center">

        :`<div class="guessRow">

      <div class="card center">

        <p style="font-size:17px">정답은 <b class="jua" style="font-size:24px">${esc(state.word)}</b></p>
        ${won?'<p class="gain" style="font-size:18px">+10점!</p>':''}
        ${wasSetter&&winInfo?'<p class="gain" style="font-size:16px">문제 낸 사람 +5점!</p>':''}
      </div>

    return;
  }

  if(ph==='final'){ el.innerHTML=finalHtml(); confetti(40); return; }

function timerHtml(){ return `<div class="timerBar"><div class="timerFill" id="tFill"></div></div><div class="bigTime" id="tNum"></div>` }

/* ── 퀴즈 답 ── */
function pickAnswer(i){
  if(myAnswered!==null||!state||state.phase!=='question') return;
  if(Date.now()>state.deadline) return;
  myAnswered=i;
  db.ref(`${ROOM}/answers/${state.qid}/${me.id}`).set({choice:i, at:Date.now()});
  renderPlayStage();
}

/* ── 추측 (그림·초성 공용) ── */
function sendGuess(){
  const inp=$('guessIn'); if(!inp)return;
  const text=inp.value.trim(); if(!text)return;
  inp.value='';
  if(!state||!['draw','cho'].includes(state.phase)) return;
  if(Date.now()>state.deadline) return;
  if(state.phase==='draw'&&state.drawerId===me.id) return;
  if(state.phase==='cho'&&state.mode==='custom'&&state.setterId===me.id) return;
  db.ref(ROOM+'/guesses').push({pid:me.id, name:me.name, text, at:Date.now()});
  if(norm(text)===norm(state.word)){
    const endPhase=state.phase==='draw'?'drawEnd':'choEnd';
    const drawerId=state.drawerId;
    const setterId=(state.phase==='cho'&&state.mode==='custom')?state.setterId:null;
    db.ref(ROOM+'/win').transaction(cur=>{
      if(cur) return;   // 이미 누가 맞힘
      return {pid:me.id, name:me.name, at:Date.now()};
    },(err,committed)=>{
      if(committed){
        const updates={};
        updates[`players/${me.id}/score`]=((players[me.id]||{}).score||0)+10;
        if(state.phase==='draw'&&drawerId)
          updates[`players/${drawerId}/score`]=((players[drawerId]||{}).score||0)+5;
        if(setterId)
          updates[`players/${setterId}/score`]=((players[setterId]||{}).score||0)+5;
        updates['state/phase']=endPhase;
        db.ref(ROOM).update(updates);
      }
    });
  }
}
function renderFeed(){
  const el=$('feed'); if(!el)return;
  el.innerHTML=feedCache.slice(-10).map(g=>
    `<div class="feedItem"><b>${esc(g.name)}</b> ${esc(g.text)}</div>`).join('');
  el.scrollTop=el.scrollHeight;
}

/* ── 그림판 ── */
function buildPalette(){
  const el=$('palette'); if(!el)return;
  el.innerHTML=PAINT_COLORS.map(c=>
    `<div class="dot ${c===paintColor?'on':''}" style="background:${c}" onclick="setColor('${c}')"></div>`).join('');
}
function setColor(c){ paintColor=c; buildPalette(); }
function setSize(s){ paintSize=s; }
function canvasEl(){ return $('cv') }
function setupCanvas(drawable){
  const cv=canvasEl(); if(!cv)return;
  const w=cv.parentElement.clientWidth||320;
  cv.width=w*2; cv.height=w*1.5; cv.style.height=(w*0.75)+'px';
  redrawCanvas();
  if(!drawable) return;
  const pos=e=>{
    const r=cv.getBoundingClientRect();
    return [ (e.clientX-r.left)/r.width, (e.clientY-r.top)/r.height ];
  };
  cv.onpointerdown=e=>{
    e.preventDefault(); cv.setPointerCapture(e.pointerId);
    curRef=db.ref(ROOM+'/strokes').push();
    curStroke={c:paintColor, s:paintSize, p:[pos(e)]};
    curRef.set(curStroke);
  };
  cv.onpointermove=e=>{
    if(!curStroke)return; e.preventDefault();
    curStroke.p.push(pos(e));
    drawStroke(curStroke);
    const now=Date.now();
    if(now-lastSync>120){ lastSync=now; curRef.set(curStroke); }
  };
  const up=e=>{ if(!curStroke)return; curRef.set(curStroke); curStroke=null; curRef=null; };
  cv.onpointerup=up; cv.onpointercancel=up;
}
function drawStroke(st){
  const cv=canvasEl(); if(!cv||!st.p.length)return;
  const ctx=cv.getContext('2d');
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.strokeStyle=st.c; ctx.lineWidth=st.s*2;
  ctx.beginPath();
  st.p.forEach(([x,y],i)=>{ i?ctx.lineTo(x*cv.width,y*cv.height):ctx.moveTo(x*cv.width,y*cv.height) });
  if(st.p.length===1){ ctx.lineTo(st.p[0][0]*cv.width+0.1, st.p[0][1]*cv.height) }
  ctx.stroke();
}
function redrawCanvas(){
  const cv=canvasEl(); if(!cv)return;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,cv.width,cv.height);
  Object.values(strokes).forEach(drawStroke);
}
function clearStrokes(){ db.ref(ROOM+'/strokes').remove(); }

/* ── 타이머 ── */
function syncTimer(){
  clearInterval(timerInt);
  if(!state||!state.deadline||!['question','draw','cho'].includes(state.phase)) return;
  const total=state.seconds*1000;
  const tick=()=>{
    const remain=Math.max(0,state.deadline-Date.now());
    const fill=$('tFill'), num=$('tNum');
    if(fill){ fill.style.width=(remain/total*100)+'%'; fill.classList.toggle('hurry',remain<total*0.3); }
    if(num) num.textContent=remain>0?Math.ceil(remain/1000)+'초':'⏰ 시간 종료!';
    if(remain<=0){
      clearInterval(timerInt);
      // 호스트가 자동으로 라운드 종료
      if(isHost&&hostAutoEnded!==state.phase+state.deadline){
        hostAutoEnded=state.phase+state.deadline;
        if(state.phase==='draw') db.ref(ROOM+'/state/phase').set('drawEnd');
        if(state.phase==='cho') db.ref(ROOM+'/state/phase').set('choEnd');
      }
    }
  };
  tick(); timerInt=setInterval(tick,250);
}

function addQuestion(){
  const text=$('qText').value.trim();
  if(!text){alert('문제를 입력해 주세요');return;}
  let options;
  if(qType==='ox'){ options=['맞다','아니다']; }
  else{
    options=[0,1,2,3].map(i=>$('opt'+i).value.trim()).filter(v=>v);
    if(options.length<2){alert('보기를 2개 이상 입력해 주세요');return;}
  }
  if(qAnswer<0||qAnswer>=options.length){alert('✔️로 정답을 표시해 주세요');return;}
  db.ref(ROOM+'/questions').push({text, type:qType, options, answer:qAnswer, order:Date.now()});
  $('qText').value=''; [0,1,2,3].forEach(i=>$('opt'+i).value='');
  qAnswer=-1; refreshAnsMarks();
}

      <button class="btn sun sm" style="margin-top:8px" onclick="db.ref(ROOM+'/state/phase').set('choEnd')">⏹️ 라운드 종료</button></div>
      <div class="feed" id="feed"></div>`;
    renderFeed(); return;
  }
  if(ph==='choEnd'){
    el.innerHTML=`<div class="card center">
      <p class="jua" style="font-size:19px">${winInfo?'🎉 '+esc(winInfo.name)+' 정답!':'⏰ 아무도 못 맞혔어요'}</p>
      <p>정답: <b class="jua">${esc(state.word)}</b></p></div>
      ${scoreboardHtml()}
      <div class="card">
      <button class="btn sky" onclick="nextCho()">🔤 다음 문제</button>
      <button class="btn sm" style="margin-top:8px" onclick="backToLobby()">게임 선택으로</button></div>`;
    return;
  }

  if(ph==='final'){
    el.innerHTML=finalHtml()+`<button class="btn sm" onclick="backToLobby()" style="margin-top:10px">🔄 게임 선택으로</button>`;
    return;
  }
}

/* ── 게임 시작/진행 ── */
function secShort(){ const e=$('secShort'); return e?Math.max(5,Math.min(120,parseInt(e.value)||30)):30 }
function secDraw(){ const e=$('secDraw'); return e?Math.max(20,Math.min(300,parseInt(e.value)||90)):90 }
let savedSecShort=30, savedSecDraw=90;

function startQuiz(){
  if(!qArr().length)return;
  savedSecShort=secShort();
  startQuizQ(0);
}
function startQuizQ(idx){
  const arr=qArr(); if(!arr[idx])return;
  db.ref(ROOM+'/state').set({
    phase:'question', game:'quiz', qid:arr[idx].id, qIndex:idx, total:arr.length,
    seconds:savedSecShort, deadline:Date.now()+savedSecShort*1000
  });
}
function revealQuiz(){
  const qid=state.qid, q=questions[qid]; if(!q)return;
  db.ref(`${ROOM}/answers/${qid}`).off();
  db.ref(`${ROOM}/answers/${qid}`).once('value',s=>{
    const answers=s.val()||{};
    const gains={}, updates={};
    const total=state.seconds*1000;
    Object.entries(answers).forEach(([pid,a])=>{
      if(a.choice===q.answer){
        const remain=Math.max(0,state.deadline-a.at);
        const pts=10+Math.round(5*remain/total);
        gains[pid]=pts;
        updates[`players/${pid}/score`]=((players[pid]||{}).score||0)+pts;
      }
    });
    updates[`results/${qid}`]={answer:q.answer, gains};
    updates['state/phase']='reveal';
    db.ref(ROOM).update(updates);
  });
}

function startDraw(){
  savedSecDraw=secDraw();
  launchDrawRound(0);
}
function nextDraw(){ launchDrawRound((state.round||0)+1) }
function launchDrawRound(round){
  const arr=playerArr();
  if(!arr.length){alert('참가자가 아직 없어요');return;}
  const drawer=arr[round%arr.length];
  db.ref(ROOM).update({
    strokes:null, guesses:null, win:null,
    state:{phase:'draw', game:'draw', round,
      drawerId:drawer.id, drawerName:drawer.name,
      word:pick(DRAW_WORDS), seconds:savedSecDraw, deadline:Date.now()+savedSecDraw*1000}
  });
}
function endDraw(){ db.ref(ROOM+'/state/phase').set('drawEnd') }

function startCho(mode){
  savedSecShort=secShort();
  mode==='custom'?launchChoSet(0):launchChoRound(1);
}
function nextCho(){
  state.mode==='custom'?launchChoSet((state.round||0)+1):launchChoRound((state.round||0)+1);
}
function launchChoRound(round){
  const word=pick(CHO_WORDS);
  db.ref(ROOM).update({
    guesses:null, win:null,
    state:{phase:'cho', game:'cho', mode:'auto', round, word, cho:toCho(word),
      seconds:savedSecShort, deadline:Date.now()+savedSecShort*1000}
  });
}
function launchChoSet(round){
  const arr=playerArr();
  if(!arr.length){alert('참가자가 아직 없어요');return;}
  const setter=arr[round%arr.length];
  db.ref(ROOM).update({
    guesses:null, win:null,
    state:{phase:'choSet', game:'cho', mode:'custom', round,
      setterId:setter.id, setterName:setter.name, seconds:savedSecShort}
  });
}
function submitChoWord(){
  const inp=$('choWordIn'); if(!inp)return;
  const word=inp.value.trim();
  if(!word){inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);return;}
  db.ref(ROOM+'/state').set({phase:'cho', game:'cho', mode:'custom', round:state.round,
    setterId:state.setterId, setterName:state.setterName,
    word, cho:toCho(word), seconds:state.seconds||30,
    deadline:Date.now()+(state.seconds||30)*1000});
}

function finishGame(){ db.ref(ROOM+'/state').set({phase:'final'}) }
function backToLobby(){ db.ref(ROOM).update({state:{phase:'lobby'}, strokes:null, guesses:null, win:null}) }
function resetGame(){
  if(!confirm('참가자와 점수를 모두 지울까요? (퀴즈 문제는 남아요)'))return;
  db.ref(ROOM).update({players:null, answers:null, results:null, strokes:null, guesses:null, win:null, state:{phase:'lobby'}});
}

/* ── 공통 ── */
function scoreboardHtml(){
  const arr=Object.entries(players).map(([id,p])=>({id,...p})).sort((a,b)=>(b.score||0)-(a.score||0));
  return `<div class="card"><h2 style="font-size:18px;margin-bottom:6px">🏅 점수판</h2>
    ${arr.map((p,i)=>`<div class="rank ${me&&p.id===me.id?'me':''}">
      <span class="no">${i+1}</span><span class="nm">${esc(p.name)}</span>
      <span class="sc">${p.score||0}점</span></div>`).join('')||'<p class="muted">...</p>'}</div>`;
}
function finalHtml(){
  const arr=Object.entries(players).map(([id,p])=>({id,...p})).sort((a,b)=>(b.score||0)-(a.score||0));
  const [g,s,b]=[arr[0],arr[1],arr[2]];
  return `<h2 class="title" style="font-size:28px">🏆 최종 결과</h2>
    <div class="podium">
      <div class="pod pod2">${s?`<div class="who">${esc(s.name)}<br>${s.score||0}점</div><div class="box"><div class="medal">🥈</div></div>`:''}</div>
      <div class="pod pod1">${g?`<div class="who">${esc(g.name)}<br>${g.score||0}점</div><div class="box"><div class="medal">🥇</div></div>`:''}</div>
      <div class="pod pod3">${b?`<div class="who">${esc(b.name)}<br>${b.score||0}점</div><div class="box"><div class="medal">🥉</div></div>`:''}</div>
    </div>
    ${arr.length>3?`<div class="card">${arr.slice(3).map((p,i)=>`<div class="rank">
      <span class="no">${i+4}</span><span class="nm">${esc(p.name)}</span><span class="sc">${p.score||0}점</span></div>`).join('')}</div>`:''}`;
}
function confetti(n=24){
  const em=['🎉','⭐','✨','🎈','🍬','💛'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='confetti';
    d.textContent=em[Math.floor(Math.random()*em.length)];
    d.style.left=Math.random()*100+'vw';
    d.style.animationDuration=(2+Math.random()*2)+'s';
    d.style.animationDelay=(Math.random()*0.6)+'s';
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),5000);
  }
}
</script>

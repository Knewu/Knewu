<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여름휴가 사전 조사 · 전력노조 집행부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <style>
        :root {
            --accent: #1a73e8;
            --accent-dk: #1557b0;
            --accent-tint: #eef4ff;
            --ink: #1f2329;
            --ink-soft: #646b76;
            --line: #e7e9ed;
            --line-soft: #eef0f3;
            --canvas: #ffffff;
            --page: #f4f6f8;
            --sun: #d93025;
            --sat: #1a73e8;
            --holiday: #d93025;
            --radius: 14px;
            --shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.04);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', -apple-system, sans-serif;
            margin: 0;
            padding: 0 0 60px;
            background-color: var(--page);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        /* ── 상단 바 (허브로 돌아가기) ── */
        .topbar {
            background: var(--canvas);
            border-bottom: 1px solid var(--line);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 2px rgba(16,24,40,.03);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--ink-soft);
            font-size: 15px;
            font-weight: 600;
            padding: 7px 12px;
            border-radius: 8px;
            transition: background .15s;
        }
        .back-btn:hover { background: var(--line-soft); }
        .topbar .crumb {
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.3px;
        }
        .topbar .crumb .sep { color: var(--line); font-weight: 400; margin: 0 8px; }

        .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 24px 0; }

        /* ── 헤더 ── */
        header {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 22px;
        }
        .title-group { padding-right: 56px; }
        .title-group h1 {
            margin: 0;
            font-size: 25px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #202124;
        }
        .title-group .sub {
            margin-top: 4px;
            font-size: 15px;
            color: var(--ink-soft);
            letter-spacing: -0.2px;
        }
        .btn-print {
            position: absolute;
            top: 2px;
            right: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--canvas);
            color: var(--ink-soft);
            border: 1px solid var(--line);
            padding: 8px 14px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, color .15s, border-color .15s;
            white-space: nowrap;
            box-shadow: var(--shadow);
        }
        .btn-print svg { width: 15px; height: 15px; }
        .btn-print:hover { border-color: var(--accent); color: var(--accent); }

        /* 🌟 인라인 이미지 저장 소형 버튼 스택 스타일 */
        .month-actions { display: flex; align-items: center; gap: 6px; }
        .btn-save-img {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--canvas); color: var(--ink-soft); border: 1px solid var(--line);
            padding: 6px 11px; border-radius: 8px; font-size: 12px; font-weight: 700;
            cursor: pointer; box-shadow: var(--shadow); transition: all .15s; white-space: nowrap;
        }
        .btn-save-img:hover { border-color: var(--accent); color: var(--accent); }
        .btn-save-img svg { width: 13px; height: 13px; }

        /* ── 등록 패널 ── */
        .register-panel {
            background: var(--canvas);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 18px;
            box-shadow: var(--shadow);
        }
        .register-panel .panel-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .register-panel .panel-head .step-icon {
            width: 34px; height: 34px;
            background: var(--accent-tint);
            color: var(--accent);
            border-radius: 9px;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .register-panel .panel-head .step-icon svg { width: 19px; height: 19px; }
        .register-panel .panel-head h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .controls {
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .controls label { font-size: 16px; font-weight: 600; color: var(--ink); }
        select {
            padding: 12px 16px;
            font-size: 17px;
            font-family: inherit;
            font-weight: 500;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--canvas);
            color: var(--ink);
            cursor: pointer;
            min-width: 200px;
            box-shadow: 0 1px 2px rgba(16,24,40,.03);
            transition: border-color .15s, box-shadow .15s;
        }
        select:hover { border-color: #cdd2da; }
        select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,115,232,.15); }
        .btn-cancel:focus, .btn-print:focus, .back-btn:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }
        .btn-cancel {
            padding: 5px 10px;
            font-size: 11.5px;
            font-family: inherit;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: var(--canvas);
            color: var(--ink-soft);
            cursor: pointer;
        }
        .btn-cancel:hover { background: var(--line-soft); }

        /* 내 등록 휴가 목록 (직책 선택 시, ✕로 삭제) */
        .myv { margin-top: 14px; border-top: 1px solid var(--line-soft); padding-top: 12px; }
        .myv-title { font-size: 15px; font-weight: 700; color: var(--ink-soft); margin-bottom: 8px; letter-spacing: -0.2px; }
        .myv-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 7px 0; font-size: 16px; }
        .myv-row .myv-name { color: var(--ink); }
        .myv-row .myv-name b { font-weight: 700; }
        .myv-x { background: #fdecea; color: #c5221f; border: none; width: 28px; height: 28px; border-radius: 7px; cursor: pointer; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; }
        .myv-x:hover { background: #f7c9c3; }
        .hint { display: inline-flex; align-items: center; gap: 7px; flex: 1; min-width: 240px; }
        .hint > svg { width: 16px; height: 16px; color: var(--accent); flex-shrink: 0; }
        #guideText {
            font-size: 15px;
            color: var(--ink-soft);
            font-weight: 500;
            letter-spacing: -0.2px;
        }
        #guideText.active { color: var(--accent); font-weight: 600; }

        /* ── 달력 ── */
        .calendar-container { display: flex; flex-direction: column; gap: 34px; }
        .month-section {
            background: var(--canvas);
            padding: 22px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .month-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 0 0 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line);
        }
        .month-title .mt-left { display: flex; align-items: baseline; gap: 3px; }
        .month-title .mt-month {
            font-size: 30px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
            line-height: 1;
        }
        .month-title .mt-unit {
            font-size: 19px;
            font-weight: 700;
            color: #202124;
            margin-right: 6px;
        }
        .month-title .yr { color: var(--ink-soft); font-weight: 500; font-size: 16px; letter-spacing: 0.5px; }
        .month-title .mt-desc {
            font-size: 13px;
            color: var(--ink-soft);
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-top: 1px solid var(--line);
            border-left: 1px solid var(--line);
        }
        .day-header {
            padding: 13px 0;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 1px;
            color: var(--ink-soft);
            border-right: 1px solid var(--line);
            border-bottom: 1px solid #dfe2e7;
            background: #fff;
        }
        .day-header:nth-child(1) { color: var(--sun); }
        .day-header:nth-child(7) { color: var(--sat); }

        .day-cell {
            background: var(--canvas);
            height: 108px;
            padding: 6px 7px;
            border-right: 1px solid var(--line-soft);
            border-bottom: 1px solid var(--line-soft);
            cursor: pointer;
            position: relative;
            transition: background .12s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .day-cell[data-wday="0"] { background: #fdf9f9; }
        .day-cell[data-wday="6"] { background: #f9fbfd; }
        .day-cell:hover { background: #eef5ff; }
        .day-cell.empty { background: #fafbfc; cursor: default; }
        .day-cell.empty:hover { background: #fafbfc; }

        .day-number {
            font-weight: 700;
            font-size: 15px;
            color: var(--ink);
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 4px;
            flex-shrink: 0;
        }
        .day-number .num {
            width: 26px; height: 26px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .day-cell[data-wday="0"] .num { color: var(--sun); }
        .day-cell[data-wday="6"] .num { color: var(--sat); }
        .day-cell.today .num { background: var(--accent); color: #fff; }

        .holiday-name { display: block; width: fit-content; max-width: 100%; margin: 0 auto 3px; font-size: 10px; font-weight: 700; color: var(--holiday); background: #fdecea; padding: 1px 6px; border-radius: 4px; letter-spacing: -0.4px; line-height: 1.35; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
        .day-cell.holiday .num { color: var(--holiday); }

        .day-cell.selected-start { background: #d2e3fc !important; box-shadow: inset 0 0 0 2px var(--accent); }
        .day-cell.selected-in-between { background: #e8f0fe !important; }

        .vacation-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .vacation-list::-webkit-scrollbar { width: 4px; }
        .vacation-list::-webkit-scrollbar-thumb { background: #cdd2d8; border-radius: 4px; }
        
        .vacation-badge {
            background: var(--c, #5f6368);
            color: #fff;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: -0.3px;
            padding: 1px 4px;
            border-radius: 5px;
            line-height: 1.2;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: default;
            flex-shrink: 0;
        }
        .vacation-badge .vname {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: inherit;
        }
        .vacation-badge .vname-full { display: none; }
        .vacation-badge .vname-short { display: block; }

        /* 🌟 이미지 생성 오버레이 (PC 등 폴백 화면용) */
        .img-overlay { position:fixed; inset:0; background:rgba(15,20,30,.78); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:18px; overflow:auto; }
        .img-overlay .img-card { background:#fff; border-radius:14px; padding:12px; max-width:94vw; box-shadow:0 18px 50px rgba(0,0,0,.4); }
        .img-overlay img { display:block; max-width:100%; height:auto; border-radius:6px; }
        .img-overlay .img-hint { color:#fff; font-size:12.5px; margin:12px 0 4px; text-align:center; line-height:1.6; }
        .img-overlay .img-btns { display:flex; gap:10px; margin-top:14px; }
        .img-overlay .img-btn { font-family:inherit; font-weight:700; font-size:14px; padding:11px 20px; border-radius:10px; border:none; cursor:pointer; text-decoration:none; }
        .img-overlay .img-dl { background:var(--accent); color:#fff; }
        .img-overlay .img-close { background:rgba(255,255,255,.18); color:#fff; }
        .cap-spin { position:fixed; inset:0; background:rgba(255,255,255,.65); z-index:9998; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:var(--ink-soft); }

        /* 🌟 캡처용 가상 스케일 타겟 타겟 스타일 */
        .capture-target { width:1024px !important; max-width:1024px !important; margin:0; background:#fff; padding:24px; box-sizing:border-box; display:block !important; }
        .capture-target .month-actions { display:none !important; } /* 버튼은 숨김 */
        .capture-target .month-title .mt-desc { display:block !important; font-size: 14px; color: var(--ink-soft); font-weight: 700; }

        @media (max-width: 640px) {
            .wrap { padding: 16px 12px 0; }
            .day-cell { height: 98px; padding: 4px 4px; }
            .day-header { font-size: 13px; padding: 7px 0; }
            .day-number { font-size: 14px; }
            .day-number .num { width: 23px; height: 23px; }
            .holiday-name { font-size: 8.5px; padding: 1px 4px; letter-spacing: -0.6px; margin: 0 auto 2px; }
            .vacation-list { gap: 2px; }
            .vacation-badge { font-size: 9.5px; padding: 1px 3px; letter-spacing: -0.5px; }
            .month-section { padding: 14px; }
            select { min-width: 100%; flex: 1; }
            .hint { min-width: 100%; }
        }

        /* ── 인쇄 ── */
        @page { size: A4 landscape; margin: 10mm; }
        @media print {
            body { background: #fff; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .topbar, .register-panel, header, .month-actions { display: none !important; }
            .del-btn { display: none !important; }
            .wrap { padding: 0; max-width: none; }
            .calendar-container { gap: 0; }
            .month-section {
                border: none; padding: 0; border-radius: 0;
                break-inside: avoid; page-break-inside: avoid;
                page-break-after: always; break-after: page;
            }
            .month-section:last-child { page-break-after: auto; break-after: auto; }
            .month-title { margin-bottom: 9px; padding-bottom: 6px; border-bottom: 1.5px solid var(--accent); }
            .month-title .mt-month { font-size: 19pt; }
            .month-title .mt-unit { font-size: 11pt; }
            .month-title .yr { font-size: 9pt; }
            .month-title .mt-desc { display: block; font-size: 9pt; }
            .calendar-grid { border-color: #b0b4ba; }
            .day-header {
                background: #fff !important;
                border-right-color: #d6d9dd;
                border-bottom: 1.5px solid #9aa0a6;
                padding: 4px 0;
                font-size: 8pt;
                letter-spacing: 1.5px;
            }
            .calendar-grid { grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(1.7cm, auto); }
            .day-cell {
                display: block;
                min-height: 1.7cm; height: auto;
                padding: 3px 4px;
                border-color: #d6d9dd;
                cursor: default;
                break-inside: avoid; page-break-inside: avoid;
                overflow: visible;
            }
            .day-cell:hover { background: #fff; }
            .day-number { font-size: 9pt; margin-bottom: 3px; }
            .day-number .num { width: 14px; height: 14px; }
            .holiday-name { font-size: 6.5pt; padding: 0.5px 4px; }

            .vacation-list {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 2px;
                overflow: visible;
                max-height: none;
            }
            .vacation-badge {
                display: block;
                border: none;
                border-radius: 3px;
                font-size: 7pt;
                font-weight: 700;
                padding: 1.5px 1px;
                line-height: 1.2;
                letter-spacing: -0.5px;
                text-align: center;
                break-inside: avoid;
                background: var(--c, #5f6368) !important;
                color: #fff !important;
            }
            .vacation-badge .vname-full,
            .vacation-badge .del-btn { display: none; }
            .vacation-badge .vname-short {
                display: block;
                color: #fff;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
        }
    </style>
</head>

            databaseURL: "https://knewu-64318-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "knewu-64318",
            storageBucket: "knewu-64318.firebasestorage.app",
            messagingSenderId: "301755569133",
            appId: "1:301755569133:web:9bd85133d084c041368de4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('vacations_2026');

        // 2. 2026년 7월 ~ 9월 대한민국 공휴일
        const holidays2026 = {
            "2026-07-17": "제헌절",
            "2026-08-15": "광복절",
            "2026-08-17": "대체휴일",
            "2026-09-24": "추석",
            "2026-09-25": "추석",
            "2026-09-26": "추석"
        };

        const MEMBERS = [
            "위원장", "수석부위원장", "사무처장", "기획처장",
            "대외협력본부장", "총무국장", "조직쟁의실장", "기획국장",
            "정책국장", "복지국장", "산업안전국장", "교육문화국장",
            "손혜석과장", "홍수정부장", "이종찬차장", "이경현과장"
        ];
        const PALETTE = [
            "#1967d2", "#c5221f", "#188038", "#976900",
            "#8e24aa", "#00796b", "#c5326b", "#b05a00",
            "#3949ab", "#2e7d32", "#ad1457", "#455a64",
            "#5e35b1", "#00838f", "#6d4c41", "#283593"
        ];
        const memberColor = {};
        MEMBERS.forEach((m, i) => memberColor[m] = PALETTE[i % PALETTE.length]);
        function colorFor(name) { return memberColor[name] || "#5f6368"; }

        const SHORT_NAME = {
            "위원장": "長", "수석부위원장": "수석", "사무처장": "사무長",
            "기획처장": "기획長", "대외협력본부장": "대협長", "총무국장": "총무",
            "조직쟁의실장": "조직", "기획국장": "기획", "정책국장": "정책",
            "복지국장": "복지", "산업안전국장": "산안", "교육문화국장": "교문",
            "손혜석과장": "혜석", "홍수정부장": "수정", "이종찬차장": "종찬",
            "이경현과장": "경현"
        };
        function shortName(name) { return SHORT_NAME[name] || name; }

        const monthsToRender = [
            { year: 2026, month: 7 },
            { year: 2026, month: 8 },
            { year: 2026, month: 9 }
        ];

        const daysOfWeek = ['일', '월', '화', '수', '목', '금', '토'];
        const container = document.getElementById('calendarContainer');

        let selectedStartDate = null;
        let allData = {};

        const _t = new Date();
        const todayStr = `${_t.getFullYear()}-${String(_t.getMonth()+1).padStart(2,'0')}-${String(_t.getDate()).padStart(2,'0')}`;

        function renderCalendars() {
            container.innerHTML = '';
            monthsToRender.forEach(({year, month}) => {
                const monthSection = document.createElement('div');
                monthSection.className = 'month-section';
                // 🌟 월별 캡처 매칭을 위한 ID 지정
                monthSection.id = `month-${month}`;

                const title = document.createElement('div');
                title.className = 'month-title';
                title.innerHTML = `
                    <div class="mt-left"><span class="mt-month">${month}</span><span class="mt-unit">월</span><span class="yr">${year}</span></div>
                    <div class="month-actions">
                        <div class="mt-desc">제24대 집행부 여름휴가 현황</div>
                        <button class="btn-save-img" onclick="event.stopPropagation(); captureMonth('${month}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            이미지 저장
                        </button>
                    </div>
                `;
                monthSection.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'calendar-grid';

                daysOfWeek.forEach(day => {
                    const header = document.createElement('div');
                    header.className = 'day-header';
                    header.innerText = day;
                    grid.appendChild(header);
                });

                const firstDayIdx = new Date(year, month - 1, 1).getDay();
                const lastDate = new Date(year, month, 0).getDate();

                for (let i = 0; i < firstDayIdx; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'day-cell empty';
                    grid.appendChild(emptyCell);
                }

                for (let date = 1; date <= lastDate; date++) {
                    const cell = document.createElement('div');
                    cell.className = 'day-cell';

                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                    cell.id = dateStr;

                    const wDay = new Date(year, month - 1, date).getDay();
                    cell.setAttribute('data-wday', wDay);
                    if (dateStr === todayStr) cell.classList.add('today');

                    let holidayHTML = '';
                    if (holidays2026[dateStr]) {
                        cell.classList.add('holiday');
                        holidayHTML = `<div class="holiday-name">${holidays2026[dateStr]}</div>`;
                    }

                    cell.innerHTML = `
                        <div class="day-number">
                            <span class="num">${date}</span>
                        </div>
                        ${holidayHTML}
                        <div class="vacation-list" id="list-${dateStr}"></div>
                    `;

                    cell.addEventListener('click', () => {
                        handleDateClick(dateStr);
                    });

                    grid.appendChild(cell);
                }

                monthSection.appendChild(grid);
                container.appendChild(monthSection);
            });
        }

        function handleDateClick(dateStr) {
            const nameSelect = document.getElementById('userName');
            const selectedName = nameSelect.value;

            if (!selectedName) {
                alert('먼저 직책을 선택한 후 날짜를 클릭해 주세요.');
                clearSelectionState();
                return;
            }

            if (!selectedStartDate) {
                selectedStartDate = dateStr;
                document.getElementById(dateStr).classList.add('selected-start');
                const g = document.getElementById('guideText');
                g.innerText = `시작일 ${dateStr} → 종료일을 누르세요`;
                g.classList.add('active');
            } else {
                let start = new Date(selectedStartDate);
                let end = new Date(dateStr);

                if (start > end) {
                    const temp = selectedStartDate;
                    selectedStartDate = dateStr;
                    dateStr = temp;
                    start = new Date(selectedStartDate);
                    end = new Date(dateStr);
                }

                const dateArray = [];
                let currentDate = new Date(start);
                while (currentDate <= end) {
                    const y = currentDate.getFullYear();
                    const m = String(currentDate.getMonth() + 1).padStart(2, '0');
                    const d = String(currentDate.getDate()).padStart(2, '0');
                    dateArray.push(`${y}-${m}-${d}`);
                    currentDate.setDate(currentDate.getDate() + 1);
                }

                dateArray.forEach(dStr => {
                    const el = document.getElementById(dStr);
                    if (el) el.classList.add('selected-in-between');
                });

                if (confirm(`${selectedName}님, ${selectedStartDate} 부터 ${dateStr} 까지 총 ${dateArray.length}일간 휴가를 등록하시겠습니까?`)) {
                    const updates = {};
                    dateArray.forEach(dStr => {
                        updates[`/${dStr}/${selectedName}`] = {
                            name: selectedName,
                            timestamp: Date.now()
                        };
                    });

                    dbRef.update(updates).then(() => {
                        clearSelectionState();
                    }).catch((error) => {
                        alert("저장 중 에러가 발생했습니다: " + error.message);
                        clearSelectionState();
                    });
                } else {
                    clearSelectionState();
                }
            }
        }

        function clearSelectionState() {
            selectedStartDate = null;
            document.querySelectorAll('.day-cell').forEach(el => {
                el.classList.remove('selected-start', 'selected-in-between');
            });
            const g = document.getElementById('guideText');
            g.innerText = "달력에서 시작일과 종료일을 차례로 누르세요";
            g.classList.remove('active');
        }

        function onUserChange() {
            clearSelectionState();
            renderMyVacations(document.getElementById('userName').value);
        }

        function fmtMD(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            return `${m}.${d}`;
        }
        function groupRanges(sortedDates) {
            const ranges = [];
            let startStr = null, prevStr = null;
            sortedDates.forEach(ds => {
                if (startStr === null) { startStr = ds; }
                else {
                    const diff = (new Date(ds) - new Date(prevStr)) / 86400000;
                    if (diff !== 1) { ranges.push([startStr, prevStr]); startStr = ds; }
                }
                prevStr = ds;
            });
            if (startStr !== null) ranges.push([startStr, prevStr]);
            return ranges;
        }
        function renderMyVacations(name) {
            const box = document.getElementById('myVacations');
            if (!name) { box.style.display = 'none'; box.innerHTML = ''; return; }
            const dates = Object.keys(allData).filter(ds => allData[ds] && allData[ds][name]).sort();
            if (dates.length === 0) { box.style.display = 'none'; box.innerHTML = ''; return; }
            const ranges = groupRanges(dates);
            box.style.display = 'block';
            box.innerHTML = '<div class="myv-title">내 등록 휴가</div>' + ranges.map(([s, e]) => {
                const label = (s === e) ? fmtMD(s) : `${fmtMD(s)}-${fmtMD(e)}`;
                return `<div class="myv-row"><span class="myv-name">${name} <b>${label}</b></span>` +
                       `<button class="myv-x" onclick="deleteMyRange('${name}','${s}','${e}')">✕</button></div>`;
            }).join('');
        }
        function deleteMyRange(name, startStr, endStr) {
            const label = (startStr === endStr) ? fmtMD(startStr) : `${fmtMD(startStr)}-${fmtMD(endStr)}`;
            if (!confirm(`${name} ${label} 휴가를 삭제할까요?`)) return;
            const updates = {};
            let cur = new Date(startStr);
            const end = new Date(endStr);
            while (cur <= end) {
                const ds = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
                updates[`/${ds}/${name}`] = null;
                cur.setDate(cur.getDate() + 1);
            }
            dbRef.update(updates);
        }

        function initFirebaseRealtime() {
            dbRef.on('value', (snapshot) => {
                allData = snapshot.val() || {};
                document.querySelectorAll('.vacation-list').forEach(el => el.innerHTML = '');

                Object.keys(allData).forEach(dateStr => {
                    const listEl = document.getElementById(`list-${dateStr}`);
                    if (listEl) {
                        const users = allData[dateStr];
                        Object.keys(users).forEach(name => {
                            const c = colorFor(name);
                            const badge = document.createElement('div');
                            badge.className = 'vacation-badge';
                            badge.style.setProperty('--c', c);
                            badge.title = name;
                            badge.innerHTML = `
                                <span class="vname vname-full">${name}</span>
                                <span class="vname vname-short">${shortName(name)}</span>
                            `;
                            listEl.appendChild(badge);
                        });
                    }
                });

                renderMyVacations(document.getElementById('userName').value);
            });
        }

        // 🌟 6. 월별 이미지 캡처 핵심 자바스크립트 로직
        function dataURLtoFile(dataurl, filename) {
            const arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]); let n = bstr.length; const u8 = new Uint8Array(n);
            while (n--) u8[n] = bstr.charCodeAt(n);
            return new File([u8], filename, { type: mime });
        }

        async function captureMonth(monthNumber) {
            if (typeof html2canvas === 'undefined') { alert('이미지 라이브러리를 로드하고 있습니다. 1~2초 후 다시 시도해 주세요.'); return; }
            
            const areaId = `month-${monthNumber}`;
            const title = `집행부 여름휴가 현황_${monthNumber}월`;
            const filename = `여름휴가_현황_${monthNumber}월.png`;
            
            const spin = document.createElement('div');
            spin.className = 'cap-spin'; spin.textContent = `${monthNumber}월 달력 이미지 만드는 중…`;
            document.body.appendChild(spin);
            
            let dataUrl = null;
            try {
                const src = document.getElementById(areaId);
                const clone = src.cloneNode(true);
                clone.classList.add('capture-target');
                
                const holder = document.createElement('div');
                holder.style.cssText = 'position:fixed; left:-12000px; top:0;';
                holder.appendChild(clone);
                document.body.appendChild(holder);
                
                await new Promise(r => setTimeout(r, 80));
                // scale: 2 적용하여 글씨가 뭉개지지 않는 선명한 고화질 확보
                const canvas = await html2canvas(clone, { scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false });
                document.body.removeChild(holder);
                dataUrl = canvas.toDataURL('image/png');
            } catch (e) {
                spin.remove();
                alert('이미지 생성에 실패했습니다.');
                return;
            }
            spin.remove();
            
            // iOS / 모바일용 내장 공유 시트 트리거 처리
            try {
                const file = dataURLtoFile(dataUrl, filename);
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title });
                    return;
                }
            } catch (e) {
                if (e && e.name === 'AbortError') return;
            }
            
            // 공유 시트 차단되거나 PC 환경일 경우 다운로드 오버레이 출력
            showImgOverlay(dataUrl, filename, title);
        }

        function showImgOverlay(dataUrl, filename, title) {
            const file = dataURLtoFile(dataUrl, filename);
            const canShare = !!(navigator.canShare && navigator.canShare({ files: [file] }));
            const ov = document.createElement('div');
            ov.className = 'img-overlay';
            const primary = canShare
                ? `<button class="img-btn img-dl" id="imgShare">사진에 저장 · 공유</button>`
                : `<a class="img-btn img-dl" href="${dataUrl}" download="${filename}">이미지 저장</a>`;
            ov.innerHTML =
                `<div class="img-hint">${canShare ? '아래 버튼 → "이미지 저장"' : '길게 눌러 저장하거나, 아래 버튼으로 다운로드하세요.'}</div>` +
                `<div class="img-card"><img src="${dataUrl}" alt="미리보기"></div>` +
                `<div class="img-btns">${primary}<button class="img-btn img-close">닫기</button></div>`;
            ov.addEventListener('click', (e) => { if (e.target === ov || e.target.classList.contains('img-close')) ov.remove(); });
            document.body.appendChild(ov);
            if (canShare) {
                document.getElementById('imgShare').addEventListener('click', async () => {
                    try { await navigator.share({ files: [file], title: title }); } catch (e) {}
                });
            }
        }

        // 초기 실행
        renderCalendars();
        initFirebaseRealtime();
    </script>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여름휴가 일정 등록 · 전력노조 집행부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <style>
        :root {
            --accent: #1a73e8;
            --accent-dk: #1557b0;
            --ink: #3c4043;
            --ink-soft: #5f6368;
            --line: #dadce0;
            --line-soft: #e8eaed;
            --canvas: #ffffff;
            --page: #f1f3f4;
            --sun: #d93025;
            --sat: #1a73e8;
            --holiday: #d93025;
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', -apple-system, sans-serif;
            margin: 0;
            padding: 0 0 60px;
            background-color: var(--page);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        /* ── 상단 바 (허브로 돌아가기) ── */
        .topbar {
            background: var(--canvas);
            border-bottom: 1px solid var(--line);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--ink-soft);
            font-size: 14px;
            font-weight: 600;
            padding: 7px 12px;
            border-radius: 8px;
            transition: background .15s;
        }
        .back-btn:hover { background: var(--line-soft); }
        .topbar .crumb {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.3px;
        }
        .topbar .crumb .sep { color: var(--line); font-weight: 400; margin: 0 8px; }

        .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 24px 0; }

        /* ── 헤더 ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 22px;
        }
        .title-group h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #202124;
        }
        .title-group .sub {
            margin-top: 4px;
            font-size: 13px;
            color: var(--ink-soft);
            letter-spacing: -0.2px;
        }
        .btn-print {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--canvas);
            color: var(--accent);
            border: 1px solid var(--line);
            padding: 9px 18px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, box-shadow .15s;
            white-space: nowrap;
        }
        .btn-print:hover { background: #f8fbff; box-shadow: 0 1px 3px rgba(60,64,67,.12); }

        /* ── 등록 패널 ── */
        .register-panel {
            background: var(--canvas);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 18px;
        }
        .register-panel .panel-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .register-panel .panel-head .step-icon {
            width: 28px; height: 28px;
            background: #fff3e0;
            border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .register-panel .panel-head h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .controls {
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .controls label { font-size: 14px; font-weight: 600; color: var(--ink); }
        select {
            padding: 9px 14px;
            font-size: 14px;
            font-family: inherit;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--canvas);
            color: var(--ink);
            cursor: pointer;
            min-width: 200px;
        }
        select:focus, .btn-cancel:focus, .btn-print:focus, .back-btn:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }
        .btn-cancel {
            padding: 9px 14px;
            font-size: 13px;
            font-family: inherit;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--canvas);
            color: var(--ink-soft);
            cursor: pointer;
        }
        .btn-cancel:hover { background: var(--line-soft); }
        #guideText {
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: -0.2px;
            flex: 1;
            min-width: 240px;
        }

        /* ── 범례 ── */
        .legend {
            background: var(--canvas);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 13px 18px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            align-items: center;
        }
        .legend .legend-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--ink-soft);
            margin-right: 4px;
            letter-spacing: 0.3px;
        }
        .legend .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12.5px;
            color: var(--ink);
        }
        .legend .dot {
            width: 11px; height: 11px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── 달력 ── */
        .calendar-container { display: flex; flex-direction: column; gap: 34px; }
        .month-section {
            background: var(--canvas);
            padding: 22px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
        }
        .month-title {
            font-size: 19px;
            font-weight: 700;
            margin: 0 0 16px;
            color: #202124;
            letter-spacing: -0.5px;
        }
        .month-title .yr { color: var(--ink-soft); font-weight: 500; font-size: 15px; margin-left: 6px; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-top: 1px solid var(--line);
            border-left: 1px solid var(--line);
        }
        .day-header {
            padding: 9px 0;
            text-align: center;
            font-weight: 600;
            font-size: 12.5px;
            color: var(--ink-soft);
            border-right: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            background: #fafbfc;
        }
        .day-header:nth-child(1) { color: var(--sun); }
        .day-header:nth-child(7) { color: var(--sat); }

        .day-cell {
            background: var(--canvas);
            min-height: 116px;
            padding: 7px 8px;
            border-right: 1px solid var(--line-soft);
            border-bottom: 1px solid var(--line-soft);
            cursor: pointer;
            position: relative;
            transition: background .12s;
        }
        .day-cell:hover { background: #f8fbff; }
        .day-cell.empty { background: #fafbfc; cursor: default; }
        .day-cell.empty:hover { background: #fafbfc; }

        .day-number {
            font-weight: 600;
            font-size: 13px;
            color: var(--ink);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 4px;
        }
        .day-number .num {
            width: 24px; height: 24px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .day-cell[data-wday="0"] .num { color: var(--sun); }
        .day-cell[data-wday="6"] .num { color: var(--sat); }
        .day-cell.today .num { background: var(--accent); color: #fff; }

        .holiday-name {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--holiday);
            letter-spacing: -0.3px;
            line-height: 1.3;
            text-align: right;
        }
        .day-cell.holiday .num { color: var(--holiday); }

        /* 선택 상태 (기간 선택) */
        .day-cell.selected-start { background: #d2e3fc !important; box-shadow: inset 0 0 0 2px var(--accent); }
        .day-cell.selected-in-between { background: #e8f0fe !important; }

        /* 휴가 뱃지 (사람별 색상) */
        .vacation-list { display: flex; flex-direction: column; gap: 3px; }
        .vacation-badge {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            padding: 2px 6px 2px 7px;
            border-radius: 5px;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: -0.3px;
            border-left: 3px solid currentColor;
            line-height: 1.4;
        }
        .vacation-badge .vname {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--ink);
        }
        .vacation-badge .del-btn {
            cursor: pointer;
            font-weight: 700;
            opacity: .45;
            flex-shrink: 0;
            padding: 0 2px;
            color: var(--ink-soft);
        }
        .vacation-badge:hover .del-btn { opacity: 1; }

        /* ── 반응형 ── */
        @media (max-width: 640px) {
            .wrap { padding: 16px 12px 0; }
            header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .day-cell { min-height: 78px; padding: 4px 4px; }
            .day-header { font-size: 11px; padding: 6px 0; }
            .day-number { font-size: 11px; }
            .vacation-badge { font-size: 9.5px; padding: 1px 4px; }
            .month-section { padding: 14px; }
            select { min-width: 100%; }
            #guideText { min-width: 100%; }
        }

        /* ── 인쇄 (구글 캘린더 인쇄본 스타일 · A4 가로) ── */
        @page { size: A4 landscape; margin: 10mm; }
        @media print {
            body { background: #fff; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .topbar, .register-panel, header { display: none !important; }
            .del-btn { display: none !important; }
            .wrap { padding: 0; max-width: none; }
            .calendar-container { gap: 0; }
            .legend {
                border: none; padding: 0 0 6px; margin-bottom: 8px;
                border-bottom: 1px solid var(--line);
                border-radius: 0;
            }
            .month-section {
                border: none; padding: 0; border-radius: 0;
                page-break-after: always; break-after: page;
            }
            .month-section:last-child { page-break-after: auto; break-after: auto; }
            .month-title { font-size: 17px; margin-bottom: 8px; }
            .calendar-grid { border-color: #9aa0a6; }
            .day-header { background: #f1f3f4 !important; border-color: #9aa0a6; }
            .day-cell {
                min-height: 0; height: 2.7cm;
                border-color: #c5c8cc;
                cursor: default;
            }
            .day-cell:hover { background: #fff; }
            .vacation-badge { border-radius: 3px; }
            .month-section:not(:first-child) .legend { display: none; }
        }
    </style>
</head>
<body>

    <div class="topbar">

            업무포털

<div class="wrap">

    <header>
        <div class="title-group">
            <h1>여름휴가 일정 등록</h1>

            현황 인쇄
        </button>
    </header>

    <div class="register-panel">
        <div class="panel-head">
            <span class="step-icon">🏖️</span>
            <h2>휴가 등록</h2>
        </div>
        <div class="controls">
            <label for="userName">집행부 성명</label>
            <select id="userName">
                <option value="">선택하세요</option>

                <option value="총무국장">총무국장</option>
                <option value="조직쟁의실장">조직쟁의실장</option>
                <option value="기획국장">기획국장</option>
                <option value="정책국장">정책국장</option>
                <option value="복지국장">복지국장</option>

            </select>
            <button class="btn-cancel" onclick="clearSelectionState()">선택 취소</button>
            <span id="guideText">이름 선택 후 시작일을 클릭하고, 이어서 종료일을 클릭하면 기간 휴가가 등록됩니다.</span>
        </div>
    </div>

    <div class="legend" id="legend"></div>

    <div class="calendar-container" id="calendarContainer"></div>

</div>

    <script>
        // 1. Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDUFwsNEBzTZxr8EJuY2BZkYTEBadQoMk8",
            authDomain: "knewu-64318.firebaseapp.com",
            databaseURL: "https://knewu-64318-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "knewu-64318",
            storageBucket: "knewu-64318.firebasestorage.app",
            messagingSenderId: "301755569133",
            appId: "1:301755569133:web:9bd85133d084c041368de4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('vacations_2026');

        // 2. 2026년 7월 ~ 9월 대한민국 공휴일
        const holidays2026 = {
            "2026-07-17": "제헌절",
            "2026-08-15": "광복절",
            "2026-08-17": "대체공휴일",
            "2026-09-24": "추석 연휴",
            "2026-09-25": "추석",
            "2026-09-26": "추석 연휴"
        };

        // 집행부 명단 + 사람별 고정 색상 (텍스트로 읽기 좋은 진한 톤)
        const MEMBERS = [
            "위원장", "수석부위원장", "사무처장", "기획처장",
            "대외협력본부장", "총무국장", "조직쟁의실장", "기획국장",
            "정책국장", "복지국장", "산업안전국장", "교육문화국장",
            "손혜석과장", "홍수정부장", "이종찬차장", "이경현과장"
        ];
        const PALETTE = [
            "#1967d2", "#c5221f", "#188038", "#976900",
            "#8e24aa", "#00796b", "#c5326b", "#b05a00",
            "#3949ab", "#2e7d32", "#ad1457", "#455a64",
            "#5e35b1", "#00838f", "#6d4c41", "#283593"
        ];
        const memberColor = {};
        MEMBERS.forEach((m, i) => memberColor[m] = PALETTE[i % PALETTE.length]);
        function colorFor(name) { return memberColor[name] || "#5f6368"; }
        function tint(hex, a) {
            const n = parseInt(hex.slice(1), 16);
            return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${a})`;
        }

        const monthsToRender = [
            { year: 2026, month: 7 },
            { year: 2026, month: 8 },
            { year: 2026, month: 9 }
        ];

        const daysOfWeek = ['일', '월', '화', '수', '목', '금', '토'];
        const container = document.getElementById('calendarContainer');

        let selectedStartDate = null;

        const _t = new Date();
        const todayStr = `${_t.getFullYear()}-${String(_t.getMonth()+1).padStart(2,'0')}-${String(_t.getDate()).padStart(2,'0')}`;

        function renderLegend() {
            const el = document.getElementById('legend');
            el.innerHTML = '<span class="legend-title">집행부 색상</span>' +
                MEMBERS.map(m =>
                    `<span class="chip"><span class="dot" style="background:${colorFor(m)}"></span>${m}</span>`
                ).join('');
        }

        function renderCalendars() {
            container.innerHTML = '';
            monthsToRender.forEach(({year, month}) => {
                const monthSection = document.createElement('div');
                monthSection.className = 'month-section';

                const title = document.createElement('div');
                title.className = 'month-title';
                title.innerHTML = `${month}월 <span class="yr">${year}</span>`;
                monthSection.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'calendar-grid';

                daysOfWeek.forEach(day => {
                    const header = document.createElement('div');
                    header.className = 'day-header';
                    header.innerText = day;
                    grid.appendChild(header);
                });

                const firstDayIdx = new Date(year, month - 1, 1).getDay();
                const lastDate = new Date(year, month, 0).getDate();

                for (let i = 0; i < firstDayIdx; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'day-cell empty';
                    grid.appendChild(emptyCell);
                }

                for (let date = 1; date <= lastDate; date++) {
                    const cell = document.createElement('div');
                    cell.className = 'day-cell';

                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                    cell.id = dateStr;

                    const wDay = new Date(year, month - 1, date).getDay();
                    cell.setAttribute('data-wday', wDay);
                    if (dateStr === todayStr) cell.classList.add('today');

                    let holidayHTML = '';
                    if (holidays2026[dateStr]) {
                        cell.classList.add('holiday');
                        holidayHTML = `<span class="holiday-name">${holidays2026[dateStr]}</span>`;
                    }

                    cell.innerHTML = `
                        <div class="day-number">
                            <span class="num">${date}</span>
                            ${holidayHTML}
                        </div>
                        <div class="vacation-list" id="list-${dateStr}"></div>
                    `;

                    cell.addEventListener('click', (e) => {
                        if (e.target.classList.contains('del-btn')) return;
                        handleDateClick(dateStr);
                    });

                    grid.appendChild(cell);
                }

                monthSection.appendChild(grid);
                container.appendChild(monthSection);
            });
        }

        // 3. 기간 선택 + 휴가 신청
        function handleDateClick(dateStr) {
            const nameSelect = document.getElementById('userName');
            const selectedName = nameSelect.value;

            if (!selectedName) {
                alert('상단에서 집행부 성명을 먼저 선택한 후 날짜를 클릭해 주세요.');
                clearSelectionState();
                return;
            }

            if (!selectedStartDate) {
                selectedStartDate = dateStr;
                document.getElementById(dateStr).classList.add('selected-start');
                document.getElementById('guideText').innerText = `시작일 ${dateStr} 선택됨 — 종료일을 클릭하면 확정됩니다.`;
            } else {
                let start = new Date(selectedStartDate);
                let end = new Date(dateStr);

                if (start > end) {
                    const temp = selectedStartDate;
                    selectedStartDate = dateStr;
                    dateStr = temp;
                    start = new Date(selectedStartDate);
                    end = new Date(dateStr);
                }

                const dateArray = [];
                let currentDate = new Date(start);
                while (currentDate <= end) {
                    const y = currentDate.getFullYear();
                    const m = String(currentDate.getMonth() + 1).padStart(2, '0');
                    const d = String(currentDate.getDate()).padStart(2, '0');
                    dateArray.push(`${y}-${m}-${d}`);
                    currentDate.setDate(currentDate.getDate() + 1);
                }

                dateArray.forEach(dStr => {
                    const el = document.getElementById(dStr);
                    if (el) el.classList.add('selected-in-between');
                });

                if (confirm(`${selectedName}님, ${selectedStartDate} 부터 ${dateStr} 까지 총 ${dateArray.length}일간 휴가를 등록하시겠습니까?`)) {
                    const updates = {};
                    dateArray.forEach(dStr => {
                        updates[`/${dStr}/${selectedName}`] = {
                            name: selectedName,
                            timestamp: Date.now()
                        };
                    });

                    dbRef.update(updates).then(() => {
                        clearSelectionState();
                    }).catch((error) => {
                        alert("저장 중 에러가 발생했습니다: " + error.message);
                        clearSelectionState();
                    });
                } else {
                    clearSelectionState();
                }
            }
        }

        function clearSelectionState() {
            selectedStartDate = null;
            document.querySelectorAll('.day-cell').forEach(el => {
                el.classList.remove('selected-start', 'selected-in-between');
            });
            document.getElementById('guideText').innerText = "이름 선택 후 시작일을 클릭하고, 이어서 종료일을 클릭하면 기간 휴가가 등록됩니다.";
        }

        // 4. 휴가 취소(삭제)
        function deleteVacation(dateStr, name) {
            if (confirm(`${name}님의 ${dateStr} 휴가 일정을 삭제하시겠습니까?`)) {
                dbRef.child(dateStr).child(name).remove();
            }
        }

        // 5. Firebase 실시간 조회
        function initFirebaseRealtime() {
            dbRef.on('value', (snapshot) => {
                document.querySelectorAll('.vacation-list').forEach(el => el.innerHTML = '');

                const data = snapshot.val();
                if (!data) return;

                Object.keys(data).forEach(dateStr => {
                    const listEl = document.getElementById(`list-${dateStr}`);
                    if (listEl) {
                        const users = data[dateStr];
                        Object.keys(users).forEach(name => {
                            const c = colorFor(name);
                            const badge = document.createElement('div');
                            badge.className = 'vacation-badge';
                            badge.style.color = c;
                            badge.style.background = tint(c, 0.10);
                            badge.innerHTML = `
                                <span class="vname">${name}</span>
                                <span class="del-btn" onclick="deleteVacation('${dateStr}', '${name}')">×</span>
                            `;
                            listEl.appendChild(badge);
                        });
                    }
                });
            });
        }

        // 초기 실행
        renderLegend();
        renderCalendars();
        initFirebaseRealtime();
    </script>
</body>
</html>

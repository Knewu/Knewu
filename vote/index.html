<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국전력노동조합 투표</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --blue:#1a73e8; --blue-dk:#1557b0; --ink:#26344f; --ink2:#6a7484;
    --line:#e2e6ee; --white:#fff; --light:#f7f9fc; --green:#15a05a; --red:#e0483b;
  }
  body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto',sans-serif;
    background:var(--light); color:var(--ink); padding:18px; -webkit-text-size-adjust:100%; }
  .wrap{ max-width:480px; margin:0 auto; }
  header{ text-align:center; margin-bottom:18px; }
  .logo{ font-size:22px; font-weight:900; letter-spacing:-.5px; }
  .tagline{ font-size:12px; color:var(--ink2); margin-top:3px; }
  .card{ background:var(--white); border:1px solid var(--line); border-radius:18px;
    padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.06); margin-bottom:14px; }
  h2{ font-size:17px; font-weight:800; margin-bottom:4px; }
  .sub{ font-size:12.5px; color:var(--ink2); margin-bottom:14px; line-height:1.5; }
  label.fld{ display:block; font-size:13px; font-weight:700; color:var(--ink); margin:14px 0 6px; }
  input[type=text], textarea, select{
    width:100%; font-family:inherit; font-size:15px; color:var(--ink);
    padding:13px 14px; border:1px solid var(--line); border-radius:12px; background:#fcfdfe; }
  input:focus, textarea:focus, select:focus{ outline:none; border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(26,115,232,.12); }
  select{ -webkit-appearance:none; appearance:none; cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236a7484' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 14px center; padding-right:38px; }
  .opt-row{ display:flex; gap:8px; margin-bottom:8px; align-items:center; }
  .opt-row input{ flex:1; }
  .opt-x{ flex-shrink:0; width:38px; height:44px; border:1px solid var(--line); border-radius:10px;
    background:#fff; color:var(--ink2); font-size:18px; cursor:pointer; }
  .btn{ display:block; width:100%; padding:15px; border:none; border-radius:13px; font-family:inherit;
    font-size:16px; font-weight:800; cursor:pointer; text-align:center; transition:background .15s; }
  .btn-primary{ background:var(--blue); color:#fff; }
  .btn-primary:active{ background:var(--blue-dk); }
  .btn-ghost{ background:#eef2f8; color:var(--ink); }
  .btn-ghost:active{ background:#e2e8f1; }
  .btn-red{ background:#fff; color:var(--red); border:1px solid #f3c6c1; }
  .btn-red:active{ background:#fdeeec; }
  .btn-add{ background:#fff; color:var(--blue); border:1px dashed #a9c6f5; font-size:14px; padding:12px; }
  .btn:disabled{ opacity:.5; cursor:default; }
  .mt{ margin-top:12px; } .mt2{ margin-top:8px; }
  .q-title{ font-size:19px; font-weight:800; line-height:1.4; margin-bottom:4px; }
  .pill{ display:inline-block; font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:999px; }
  .pill-live{ background:#e7f3ee; color:var(--green); }
  .pill-closed{ background:#f0eef6; color:#6b5fa8; }
  .choice{ display:block; width:100%; text-align:left; padding:15px 16px; border:2px solid var(--line);
    border-radius:13px; background:#fff; font-size:15.5px; font-weight:600; color:var(--ink);
    margin-bottom:10px; cursor:pointer; transition:all .12s; }
  .choice:active{ transform:scale(.99); }
  .choice.sel{ border-color:var(--blue); background:#eef4ff; color:var(--blue-dk); }
  .done-box{ text-align:center; padding:18px 0; }
  .done-ic{ font-size:46px; }
  .done-tx{ font-size:17px; font-weight:800; margin-top:8px; }
  .done-sub{ font-size:13px; color:var(--ink2); margin-top:6px; line-height:1.55; }
  .pin-box{ background:#fff7e6; border:1px solid #f3dca0; border-radius:12px; padding:14px 16px;
    text-align:center; margin-top:14px; }
  .pin-lbl{ font-size:12px; color:#9a7b1f; font-weight:700; }
  .pin-num{ font-size:30px; font-weight:900; letter-spacing:8px; color:#7a5e08; margin-top:4px; }
  .share-row{ display:flex; gap:8px; margin-top:12px; }
  .share-row .btn{ font-size:14px; padding:13px; }
  /* 결과 막대 */
  .res-row{ margin-bottom:14px; }
  .res-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .res-name{ font-size:15px; font-weight:700; } .res-name.win{ color:var(--blue); }
  .res-cnt{ font-size:13px; color:var(--ink2); font-weight:700; }
  .res-bar{ height:14px; background:#eef2f8; border-radius:8px; overflow:hidden; }
  .res-fill{ height:100%; background:var(--blue); border-radius:8px; transition:width .5s ease; }
  .res-fill.win{ background:linear-gradient(90deg,#1a73e8,#34a0ff); }
  .crown{ font-size:15px; }
  .meta{ font-size:12px; color:var(--ink2); text-align:center; margin-top:14px; }
  .err{ color:var(--red); font-size:12.5px; margin-top:8px; font-weight:600; }
  .center{ text-align:center; }
  .hide{ display:none !important; }
  .loading{ text-align:center; color:var(--ink2); padding:40px 0; font-size:14px; }
  .timer{ font-size:13px; color:var(--blue); font-weight:700; text-align:center; margin-top:10px; }
  .pin-input{ letter-spacing:6px; text-align:center; font-weight:800; font-size:20px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">전국전력노동조합</div>
    <div class="tagline">간편 투표</div>
  </header>

  <div id="app"><div class="loading">불러오는 중…</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script>
/* ===== Firebase (듀티/만찬게임과 동일 프로젝트) ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDUFwsNEBzTZxr8EJuY2BZkYTEBadQoMk8",
  authDomain: "knewu-64318.firebaseapp.com",
  databaseURL: "https://knewu-64318-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "knewu-64318",
  storageBucket: "knewu-64318.firebasestorage.app",
  messagingSenderId: "301755569133",
  appId: "1:301755569133:web:9bd85133d084c041368de4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const voteRef = db.ref('vote_session_v1'); // 한 번에 하나 — 새로 만들면 덮어쓰기

/* ===== 상수 ===== */
const ROLES = ["위원장","수석","사무長","기획長","대협長","총무","조직","기획","정책","복지","산안","교문","손課","홍部","김次","이課"];
const LS_OWNER = 'knewu_vote_owner_v1'; // 만든 폰 표식 {pin}
const LS_MYROLE = 'knewu_vote_role_v1'; // 마지막 선택 직책 기억

let session = null;     // 현재 투표 데이터
let myChoice = null;    // 만들기 화면 임시
let optCount = 2;

/* ===== 유틸 ===== */
const $ = (id) => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function genPin(){ return String(Math.floor(1000 + Math.random()*9000)); }
function isOwner(){ try{ return !!localStorage.getItem(LS_OWNER); }catch(e){ return false; } }
function ownerPin(){ try{ return JSON.parse(localStorage.getItem(LS_OWNER)||'{}').pin || ''; }catch(e){ return ''; } }
function shareUrl(){ const u=location.href; return u.substring(0, u.lastIndexOf('/')+1) + 'index.html'; }

/* ===== 실시간 구독 ===== */
voteRef.on('value', (snap)=>{ session = snap.val(); render(); });

/* ====== 렌더 진입 ====== */
function render(){
  const app = $('app');
  if(!session){ app.innerHTML = viewCreate(); bindCreate(); return; }
  if(session.status === 'closed'){ app.innerHTML = viewResult(); return; }
  // 진행 중
  app.innerHTML = viewVote(); bindVote();
}

/* ====== ① 만들기 화면 ====== */
function viewCreate(){
  let opts = '';
  for(let i=0;i<optCount;i++){
    opts += `<div class="opt-row">
      <input type="text" id="opt${i}" placeholder="보기 ${i+1}" autocomplete="off">
      ${i>=2?`<button class="opt-x" onclick="rmOpt(${i})">✕</button>`:''}
    </div>`;
  }
  return `<div class="card">
    <h2>투표 만들기</h2>
    <div class="sub">질문과 보기를 입력하세요. 만든 사람이 마감할 수 있어요.</div>
    <label class="fld">질문</label>
    <input type="text" id="q" placeholder="예) 새 명칭 공모 1등은?" autocomplete="off">
    <label class="fld">보기</label>
    <div id="opts">${opts}</div>
    <button class="btn btn-add mt2" onclick="addOpt()">➕ 보기 추가</button>
    <label class="fld">자동 마감 (선택)</label>
    <select id="timer">
      <option value="0">자동 마감 없음 (수동으로 마감)</option>
      <option value="5">5분 후 자동 마감</option>
      <option value="10">10분 후 자동 마감</option>
      <option value="30">30분 후 자동 마감</option>
      <option value="60">1시간 후 자동 마감</option>
    </select>
    <button class="btn btn-primary mt" onclick="createVote()">투표 생성</button>
    <div class="err hide" id="cErr"></div>
  </div>
  <div class="card">
    <div class="sub center" style="margin:0;">이미 진행 중인 투표가 있으면 이 화면 대신 투표가 떠요.<br>새로 만들면 <b>이전 투표는 사라집니다.</b></div>
  </div>`;
}
function bindCreate(){}
function addOpt(){ optCount++; render(); }
function rmOpt(i){ if(optCount>2){ optCount--; } render(); }
function createVote(){
  const q = $('q').value.trim();
  const opts = [];
  for(let i=0;i<optCount;i++){ const v=$('opt'+i).value.trim(); if(v) opts.push(v); }
  const err = $('cErr');
  if(!q){ err.textContent='질문을 입력하세요.'; err.classList.remove('hide'); return; }
  if(opts.length<2){ err.textContent='보기를 2개 이상 입력하세요.'; err.classList.remove('hide'); return; }
  const mins = parseInt($('timer').value,10) || 0;
  const pin = genPin();
  const now = Date.now();
  const data = {
    q, options: opts, status:'open', pin,
    createdAt: now,
    closeAt: mins>0 ? now + mins*60000 : 0,
    votes: {} // { 직책: optionIndex }
  };
  try{ localStorage.setItem(LS_OWNER, JSON.stringify({pin, createdAt:now})); }catch(e){}
  voteRef.set(data);
}

/* ====== ② 투표 화면 ====== */
function myRole(){ try{ return localStorage.getItem(LS_MYROLE)||''; }catch(e){ return ''; } }
function viewVote(){
  const owner = isOwner();
  const total = session.votes ? Object.keys(session.votes).length : 0;
  const roleOpts = ['<option value="">직책 선택…</option>']
    .concat(ROLES.map(r=>`<option value="${r}">${r}</option>`)).join('');
  const choices = session.options.map((o,i)=>
    `<button class="choice" data-i="${i}" onclick="pick(${i})">${esc(o)}</button>`).join('');
  return `<div class="card">
    <span class="pill pill-live">● 투표 진행 중</span>
    <div class="q-title mt2">${esc(session.q)}</div>
    <label class="fld">내 직책</label>
    <select id="role">${roleOpts}</select>
    <div id="choices" class="mt">${choices}</div>
    <button class="btn btn-primary mt" id="submitBtn" onclick="submitVote()">투표 제출</button>
    <div class="err hide" id="vErr"></div>
    <div id="voteDone" class="hide"></div>
    ${timerHtml()}
  </div>
  ${owner ? ownerPanel(total) : participantFoot(total)}`;
}
function timerHtml(){
  if(!session.closeAt) return '';
  return `<div class="timer" id="timerTx"></div>`;
}
function participantFoot(total){
  return `<div class="card">
    <div class="sub center">결과는 <b>마감 후</b> 공개돼요. 현재 ${total}명 참여.</div>
    <details style="margin-top:6px;">
      <summary style="font-size:12.5px;color:var(--ink2);cursor:pointer;text-align:center;">관리자라면 PIN으로 마감</summary>
      <input type="text" id="pinInput" class="pin-input mt2" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off">
      <button class="btn btn-red mt2" onclick="closeWithPin()">🔒 PIN으로 마감</button>
      <div class="err hide" id="pinErr"></div>
    </details>
  </div>`;
}
function ownerPanel(total){
  return `<div class="card">
    <h2>관리 (만든 사람)</h2>
    <div class="sub">현재 <b>${total}명</b> 참여. 마감하면 모두에게 결과가 공개돼요.</div>
    <div class="pin-box">
      <div class="pin-lbl">관리 PIN (다른 폰에서 마감할 때 사용)</div>
      <div class="pin-num">${ownerPin()}</div>
    </div>
    <button class="btn btn-red mt" onclick="closeVote()">🔒 투표 마감</button>
  </div>`;
}
function bindVote(){
  const r = $('role'); if(r && myRole()) r.value = myRole();
  // 이미 이 직책으로 투표했으면 표시
  refreshMyChoiceUI();
  startTimer();
}
function pick(i){
  myChoice = i;
  document.querySelectorAll('.choice').forEach(c=>c.classList.toggle('sel', +c.dataset.i===i));
}
function refreshMyChoiceUI(){
  const r = $('role'); if(!r) return;
  r.onchange = ()=>{
    try{ localStorage.setItem(LS_MYROLE, r.value); }catch(e){}
    const prev = session.votes && session.votes[r.value];
    if(prev!==undefined && prev!==null){ pick(prev); }
  };
}
function submitVote(){
  const role = $('role').value;
  const err = $('vErr');
  if(!role){ err.textContent='직책을 선택하세요.'; err.classList.remove('hide'); return; }
  if(myChoice===null){ err.textContent='보기를 선택하세요.'; err.classList.remove('hide'); return; }
  err.classList.add('hide');
  try{ localStorage.setItem(LS_MYROLE, role); }catch(e){}
  voteRef.child('votes').child(role).set(myChoice).then(()=>{
    $('choices').classList.add('hide');
    $('submitBtn').classList.add('hide');
    const d = $('voteDone'); d.classList.remove('hide');
    d.innerHTML = `<div class="done-box">
      <div class="done-ic">✅</div>
      <div class="done-tx">[${esc(role)}] 투표 완료</div>
      <div class="done-sub">결과는 마감 후 공개돼요.<br>직책을 다시 고르면 <b>변경</b>할 수 있어요.</div>
      <button class="btn btn-ghost mt" onclick="reopenChoices()">선택 변경</button>
    </div>`;
  });
}
function reopenChoices(){
  $('choices').classList.remove('hide');
  $('submitBtn').classList.remove('hide');
  $('voteDone').classList.add('hide');
}
let timerInt = null;
function startTimer(){
  if(timerInt) clearInterval(timerInt);
  if(!session.closeAt) return;
  const tick = ()=>{
    const el = $('timerTx'); if(!el) return;
    const left = session.closeAt - Date.now();
    if(left<=0){ el.textContent='마감 시간 도달'; if(isOwner()) closeVote(); clearInterval(timerInt); return; }
    const m = Math.floor(left/60000), s = Math.floor((left%60000)/1000);
    el.textContent = `⏱ 자동 마감까지 ${m}:${String(s).padStart(2,'0')}`;
  };
  tick(); timerInt = setInterval(tick, 1000);
}

/* ====== 마감 ====== */
function closeVote(){
  if(!confirm('투표를 마감할까요? 마감 후엔 모두에게 결과가 공개되고 더 이상 투표할 수 없어요.')) return;
  voteRef.child('status').set('closed');
  voteRef.child('closedAt').set(Date.now());
}
// 비-소유자용 PIN 마감 (결과 화면에서 호출 가능하도록 분리)
function closeWithPin(){
  const pin = ($('pinInput')?.value||'').trim();
  const e = $('pinErr');
  if(pin !== session.pin){ if(e){ e.textContent='PIN이 올바르지 않습니다.'; e.classList.remove('hide'); } return; }
  voteRef.child('status').set('closed');
  voteRef.child('closedAt').set(Date.now());
}

/* ====== ③ 결과 화면 (마감 후, 집계만) ====== */
function viewResult(){
  const votes = session.votes || {};
  const counts = session.options.map(()=>0);
  Object.values(votes).forEach(i=>{ if(i>=0 && i<counts.length) counts[i]++; });
  const total = Object.keys(votes).length;
  const max = Math.max(1, ...counts);
  const isWin = counts.map(c=> c===max && c>0);
  const rows = session.options.map((o,i)=>{
    const c = counts[i], pct = total? Math.round(c/total*100):0;
    const w = isWin[i];
    return `<div class="res-row">
      <div class="res-head">
        <span class="res-name ${w?'win':''}">${w?'<span class="crown">👑</span> ':''}${esc(o)}</span>
        <span class="res-cnt">${c}표 · ${pct}%</span>
      </div>
      <div class="res-bar"><div class="res-fill ${w?'win':''}" style="width:${(c/max*100)||0}%"></div></div>
    </div>`;
  }).join('');
  const owner = isOwner();
  return `<div class="card">
    <span class="pill pill-closed">■ 투표 마감됨</span>
    <div class="q-title mt2">${esc(session.q)}</div>
    <div class="sub" style="margin-top:8px;">총 ${total}명 참여 · 집계 결과</div>
    <div class="mt">${rows}</div>
    <div class="meta">누가 무엇을 골랐는지는 공개되지 않습니다 (집계만).</div>
  </div>
  <div class="card center">
    ${owner ? `<button class="btn btn-primary" onclick="newVote()">새 투표 만들기</button>`
            : `<div class="sub" style="margin:0;">새 투표는 만든 사람이 시작할 수 있어요.</div>`}
  </div>`;
}
function newVote(){
  if(!confirm('새 투표를 만들까요? 현재 결과는 사라집니다.')) return;
  try{ localStorage.removeItem(LS_OWNER); }catch(e){}
  optCount=2; myChoice=null;
  voteRef.remove();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전력노조 집행부 업무포털</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1a73e8;
      --blue-dk: #1557b0;
      --ink:     #202124;
      --ink2:    #5f6368;
      --line:    #dadce0;
      --bg:      #f1f3f4;
      --white:   #ffffff;
      --red:     #d93025;
    }

    body {
      font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── 상단 헤더 ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .logo-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.3px;
    }
    .logo-text span { color: var(--blue); }

    /* ── 히어로 배너 ── */
    .hero {
      background: linear-gradient(135deg, #1557b0 0%, #1a73e8 60%, #4285f4 100%);
      color: #fff;
      padding: 44px 32px 40px;
      text-align: center;
    }
    .hero .hero-logo {
      width: 72px; height: 72px;
      margin: 0 auto 16px;
      background: #fff;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
      overflow: hidden;
    }
    .hero .hero-logo img { width: 84%; height: 84%; object-fit: contain; }
    .hero h1 {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.6px;
      margin-bottom: 8px;
    }
    .hero p {
      font-size: 14px;
      opacity: .82;
      letter-spacing: -0.2px;
    }

    /* ── 메인 콘텐츠 ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 24px 60px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: var(--ink2);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* ── 카드 그리드 ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow .18s, transform .18s;
      cursor: pointer;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      transform: translateY(-2px);
    }

    .card-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .card-icon.summer { background: #fff3e0; }
    .card-icon.coming { background: #f1f3f4; }

    .card-body h2 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .card-body p {
      font-size: 13px;
      color: var(--ink2);
      line-height: 1.55;
    }

    .card-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
    }
    .badge.live   { background: #e6f4ea; color: #188038; }
    .badge.soon   { background: #f1f3f4; color: var(--ink2); }
    .arrow { font-size: 18px; color: var(--line); }
    .card:hover .arrow { color: var(--blue); }

    /* ── 비활성 카드 ── */
    .card.disabled {
      opacity: .55;
      cursor: default;
      pointer-events: none;
    }

    /* ── 푸터 ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--ink2);
      border-top: 1px solid var(--line);
      background: var(--white);
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon"><img src="https://knewu.netlify.app/icon-192.png" alt="전국전력노동조합 로고"></div>
  <div class="logo-text">전국전력노동조합 <span>집행부 업무포털</span></div>
</header>

<div class="hero">
  <div class="hero-logo"><img src="https://knewu.netlify.app/icon-192.png" alt="전국전력노동조합 로고"></div>
  <h1>제24대 집행부 업무포털</h1>
  <p>집행부 전용 내부 시스템입니다 · 전국전력노동조합</p>
</div>

<main>
  <div class="section-label">서비스 메뉴</div>
  <div class="card-grid">

    <!-- ① 여름휴가 등록 -->
    <a href="vacation.html" class="card">
      <div class="card-icon summer">🏖️</div>
      <div class="card-body">
        <h2>여름휴가 일정 등록</h2>
        <p>집행부 16명의 7~9월 여름휴가 일정을<br>공유하고 한눈에 확인합니다.</p>
      </div>
      <div class="card-footer">
        <span class="badge live">● 운영 중</span>
        <span class="arrow">›</span>
      </div>
    </a>

    <!-- ② 이후 추가될 메뉴 자리 (예시) -->
    <a href="duty.html" class="card">
      <div class="card-icon coming">📋</div>
      <div class="card-body">
        <h2>다음주 주간업무, 출장·근태 관리</h2>
        <p>다음주 집행부 주간업무, 출장 및 근태 일정을<br>등록하고 승인합니다.</p>
      </div>
      <div class="card-footer">
        <span class="badge soon">준비 중</span>
        <span class="arrow">›</span>
      </div>
    </div>

    <div class="card disabled">
      <div class="card-icon coming">📁</div>
      <div class="card-body">
        <h2>회의·문서 관리</h2>
        <p>집행부 회의록 및 공문서를<br>등록·공유합니다.</p>
      </div>
      <div class="card-footer">
        <span class="badge soon">준비 중</span>
        <span class="arrow">›</span>
      </div>
    </div>

  </div>
</main>

<footer>
  전국전력노동조합 제24대 집행부 내부 시스템 · 외부 공개 금지
</footer>

</body>
</html>

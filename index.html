<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전력노조 집행부 업무포털</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1a73e8;
      --blue-dk: #1557b0;
      --ink:     #202124;
      --ink2:    #5f6368;
      --line:    #dadce0;
      --bg:      #f1f3f4;
      --white:   #ffffff;
    }

    body {
      font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 슬림 헤더 ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      padding: 0 18px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-icon { width: 30px; height: 30px; border-radius: 7px; overflow: hidden; flex-shrink: 0; }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .logo-text { font-size: 14.5px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text span { color: var(--blue); }

    /* ── 슬림 히어로 (타이틀 바) ── */
    .hero {
      background: linear-gradient(135deg, #1557b0 0%, #1a73e8 60%, #4285f4 100%);
      color: #fff;
      padding: 15px 20px;
      text-align: center;
    }
    .hero h1 { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }

    /* ── 메인 ── */
    main {
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 18px 60px;
      flex: 1;
    }
    .section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--ink2);
      text-transform: uppercase;
      margin: 2px 2px 16px;
    }

    /* ── 서비스 타일 (크고 또렷하게) ── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }
    .tile {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 26px 16px 22px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: box-shadow .2s, transform .2s, border-color .2s;
    }
    .tile:hover {
      box-shadow: 0 8px 22px rgba(0,0,0,.09);
      transform: translateY(-3px);
      border-color: #4285f4;
    }
    .tile-icon {
      position: relative;
      width: 68px; height: 68px;
      border-radius: 19px;
      display: flex; align-items: center; justify-content: center;
      font-size: 35px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .tile-icon.c1 { background: #e8f0fe; }
    .tile-icon.c2 { background: #e3f2fd; }
    .tile-icon.c3 { background: #fef7e0; }
    .tile-icon.c4 { background: #e6f4ea; }
    .tile-icon .dot {
      position: absolute; top: -3px; right: -3px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #34a853; border: 3px solid var(--white);
    }
    .tile-label {
      font-size: 15.5px;
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
      letter-spacing: -0.3px;
      color: var(--ink);
    }

    /* ── 푸터 ── */
    footer {
      text-align: center;
      padding: 18px;
      font-size: 11.5px;
      color: var(--ink2);
      border-top: 1px solid var(--line);
      background: var(--white);
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon"><img src="https://knewu.netlify.app/icon-192.png" alt="로고"></div>
  <div class="logo-text">전국전력노동조합 <span>집행부 업무포털</span></div>
</header>

<div class="hero">
  <h1>제24대 집행부 업무포털</h1>
</div>

<main>
  <div class="section-label">서비스</div>
  <div class="app-grid">

    <a href="vacation.html" class="tile">
      <div class="tile-icon c1">🏖️<span class="dot"></span></div>
      <div class="tile-label">여름휴가 일정</div>
    </a>

    <a href="duty.html" class="tile">
      <div class="tile-icon c2">📋<span class="dot"></span></div>
      <div class="tile-label">주간업무 · 근태</div>
    </a>

    <!-- 서비스 추가 시 아래 형식을 복사해서 붙이면 됩니다.
    <a href="새주소.html" class="tile">
      <div class="tile-icon c3">🗂️<span class="dot"></span></div>
      <div class="tile-label">새 서비스</div>
    </a>
    -->

  </div>
</main>

<footer>
  전국전력노동조합 제24대 집행부 내부 시스템 · 외부 공개 금지
</footer>

</body>
</html>

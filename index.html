<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전력노조 집행부 업무포털</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1a73e8;
      --blue-dk: #1557b0;
      --ink:     #202124;
      --ink2:    #5f6368;
      --line:    #dadce0;
      --bg:      #f1f3f4;
      --white:   #ffffff;
    }

    body {
      font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 슬림 헤더 ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      padding: 0 18px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-icon {
      width: 30px; height: 30px;
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .logo-text {
      font-size: 14.5px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo-text span { color: var(--blue); }

    /* ── 컴팩트 히어로 ── */
    .hero {
      background: linear-gradient(135deg, #1557b0 0%, #1a73e8 60%, #4285f4 100%);
      color: #fff;
      padding: 22px 20px 24px;
      text-align: center;
    }
    .hero-logo {
      width: 50px; height: 50px;
      margin: 0 auto 10px;
      background: #fff;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(0,0,0,.16);
      overflow: hidden;
    }
    .hero-logo img { width: 84%; height: 84%; object-fit: contain; }
    .hero h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.4px; }

    /* ── 메인 ── */
    main {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 22px 16px 60px;
      flex: 1;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--ink2);
      text-transform: uppercase;
      margin: 4px 4px 14px;
    }

    /* ── 앱 아이콘 그리드 ── */
    .app-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tile {
      width: 104px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      padding: 12px 6px 11px;
      border-radius: 16px;
      transition: background .15s, transform .15s, box-shadow .15s;
    }
    .tile:hover {
      background: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
    }
    .tile-icon {
      position: relative;
      width: 54px; height: 54px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 27px;
      box-shadow: 0 2px 6px rgba(0,0,0,.07);
    }
    .tile-icon.c1 { background: #e8f0fe; }
    .tile-icon.c2 { background: #e3f2fd; }
    .tile-icon.c3 { background: #fef7e0; }
    .tile-icon.c4 { background: #e6f4ea; }
    .tile-icon .dot {
      position: absolute; top: -3px; right: -3px;
      width: 13px; height: 13px; border-radius: 50%;
      background: #34a853; border: 2.5px solid var(--bg);
    }
    .tile:hover .tile-icon .dot { border-color: var(--white); }
    .tile-label {
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      line-height: 1.35;
      letter-spacing: -0.3px;
      color: var(--ink);
    }

    /* ── 푸터 ── */
    footer {
      text-align: center;
      padding: 18px;
      font-size: 11.5px;
      color: var(--ink2);
      border-top: 1px solid var(--line);
      background: var(--white);
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon"><img src="https://knewu.netlify.app/icon-192.png" alt="로고"></div>
  <div class="logo-text">전국전력노동조합 <span>집행부 업무포털</span></div>
</header>

<div class="hero">
  <div class="hero-logo"><img src="https://knewu.netlify.app/icon-192.png" alt="로고"></div>
  <h1>제24대 집행부 업무포털</h1>
</div>

<main>
  <div class="section-label">서비스</div>
  <div class="app-grid">

    <a href="vacation.html" class="tile">
      <div class="tile-icon c1">🏖️<span class="dot"></span></div>
      <div class="tile-label">여름휴가<br>일정</div>
    </a>

    <a href="duty.html" class="tile">
      <div class="tile-icon c2">📋<span class="dot"></span></div>
      <div class="tile-label">주간업무<br>·근태</div>
    </a>

    <!-- 서비스 추가 시 아래 형식으로 복사해서 붙이면 됩니다.
    <a href="새주소.html" class="tile">
      <div class="tile-icon c3">🗂️<span class="dot"></span></div>
      <div class="tile-label">새 서비스</div>
    </a>
    -->

  </div>
</main>

<footer>
  전국전력노동조합 제24대 집행부 내부 시스템 · 외부 공개 금지
</footer>

</body>
</html>

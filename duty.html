<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국전력노동조합 주간업무 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <style>
        :root {
            --accent: #1557b0;
            --ink: #202124;
            --ink-soft: #5f6368;
            --line: #dadce0;
            --page: #f1f3f4;
            --canvas: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: var(--page);
            color: var(--ink);
            padding-bottom: 80px;
        }

        /* ── 상단 바 ── */
        .topbar {
            background: var(--canvas); border-bottom: 1px solid var(--line);
            padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 14px;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
            color: var(--ink-soft); font-size: 14px; font-weight: 600; padding: 7px 12px; border-radius: 8px;
        }
        .back-btn:hover { background: var(--line-soft); }
        .topbar .crumb { font-size: 14px; font-weight: 700; }

        .wrap { max-width: 760px; margin: 0 auto; padding: 24px 16px; }

        /* 입력 패널 컨트롤 */
        .panel {
            background: var(--canvas); border: 1px solid var(--line); border-radius: 16px;
            padding: 20px; margin-bottom: 24px; display: flex; flex-direction: column; gap: 16px;
        }
        .form-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        select, textarea, input, button {
            padding: 9px 12px; font-family: inherit; font-size: 13.5px; border: 1px solid var(--line); border-radius: 8px;
        }
        select { background: white; min-width: 160px; font-weight: 600; cursor: pointer; }
        textarea { width: 100%; height: 90px; resize: vertical; line-height: 1.5; }
        
        .btn-save { background: var(--accent); color: white; border: none; font-weight: 700; cursor: pointer; padding: 9px 18px; }
        .btn-save:hover { background: #0d47a1; }
        .btn-print {
            background: #28a745; color: white; border: none; font-weight: 700; cursor: pointer;
            padding: 10px 20px; border-radius: 30px; font-size: 14px; display: inline-flex; align-items: center; gap: 6px;
            box-shadow: 0 4px 10px rgba(40,167,69,0.25);
        }
        .btn-print:hover { background: #218838; transform: translateY(-1px); }

        /* 부서 선택 전 블라인드 처리 */
        .disabled-content { opacity: 0.3; pointer-events: none; }

        /* ── 📱 주간업무 리포트 디자인 (초압축 스타일) ── */
        .report-paper {
            background: #ffffff;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 32px 36px;
            position: relative;
            overflow: hidden;
        }
        /* 상단 블루 탑 바 */
        .report-paper::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 10px;
            background: linear-gradient(90deg, #1557b0 0%, #1a73e8 100%);
        }

        .rep-header { margin-bottom: 24px; border-bottom: 1px solid #edf2f7; padding-bottom: 12px; }
        .rep-title { font-size: 24px; font-weight: 900; color: #1557b0; letter-spacing: -0.8px; margin-bottom: 2px; }
        .rep-date { font-size: 13px; color: #95a5a6; font-weight: 600; font-family: monospace; }

        .rep-section { margin-bottom: 24px; }
        .rep-section-title { font-size: 15px; font-weight: 800; color: #2c3e50; margin-bottom: 12px; letter-spacing: -0.3px; }

        /* 리포트 카드 박스 여백 압축 */
        .rep-card-box {
            background: #fcfcfc; border: 1px solid #edf2f7; border-radius: 16px; padding: 16px 20px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .rep-item { display: flex; align-items: flex-start; gap: 12px; }
        
        /* 부서명 배지 스타일 */
        .dept-badge {
            width: 42px; padding: 3px 0; text-align: center; font-size: 11px; font-weight: 700; border-radius: 5px; flex-shrink: 0; margin-top: 2px;
        }
        .this-week .dept-badge { border: 1.5px solid #1a73e8; color: #1a73e8; background: #f4f8ff; }
        .last-week .dept-badge { border: 1.5px solid #d4af37; color: #b8860b; background: #fffdf0; }

        /* 업무 내용 (글씨 크기 줄여 가독성 최적화) */
        .dept-content {
            flex: 1; font-size: 13.5px; color: #2d3748; line-height: 1.6; font-weight: 500;
            white-space: pre-wrap; outline: none; padding: 2px; border-radius: 4px;
        }
        .dept-content:hover { background: #fffde7; cursor: edit; box-shadow: 0 0 0 1px #ffd54f; }
        .dept-content:focus { background: #fffde7; box-shadow: 0 0 0 2px #1a73e8; }
        .no-data-text { color: #a0aec0; font-size: 13px; font-style: italic; font-weight: 400; }

        .rep-footer {
            margin-top: 36px; padding-top: 16px; border-top: 1px solid #edf2f7;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; color: #718096; font-weight: 600;
        }

        /* ── 🖨️ 인쇄 제어 (A4 정비율 초압축) ── */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: #fff; padding: 0; color: #000; }
            .topbar, .panel, .btn-print { display: none !important; }
            .wrap { max-width: none; width: 100%; padding: 0; }
            .report-paper { box-shadow: none; border-radius: 0; padding: 15mm 15mm; min-height: 297mm; }
            .report-paper::before { height: 14px; }
            .dept-content:hover { background: transparent !important; box-shadow: none !important; }
            .rep-card-box { background: #fff !important; border: 1px solid #cbd5e0 !important; padding: 14px 18px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .dept-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-data-text { display: none !important; } /* 인쇄 시 미입력 부서는 공간 절약을 위해 가림 처리 */
        }
    </style>
</head>
<body>

    <div class="topbar">
        <a class="back-btn" href="index.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            업무포털
        </a>
        <span class="crumb">집행부 업무포털 <span class="sep">/</span> 주간업무 리포트</span>
    </div>

    <div class="wrap">
        
        <div class="panel">
            <h2 style="font-size: 15px; font-weight: 800; color: #1557b0;">⚡ 실·국별 주간 활동 내용 입력</h2>
            <div class="form-row">
                <select id="inputPeriod" onchange="updateDeptPanel()">
                    <option value="thisWeek">이번 주 활동계획</option>
                    <option value="lastWeek">지난 주 주요활동</option>
                </select>
                <select id="inputDept" onchange="updateDeptPanel()">
                    <option value="">-- 실·국 선택 --</option>
                    <option value="조직">조직국</option>
                    <option value="복지">복지국</option>
                    <option value="산안">산업안전국</option>
                    <option value="교문">교육문화국</option>
                    <option value="총무">총무국</option>
                    <option value="기획">기획국</option>
                    <option value="정책">정책국</option>
                </select>
            </div>
            
            <div id="inputFormBlock" class="disabled-content" style="display: flex; flex-direction: column; gap: 12px;">
                <textarea id="textContent" placeholder="활동 계획을 입력하세요. 내용을 모두 지우고 저장을 누르면 리포트에서 삭제됩니다."></textarea>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 12px; color: #e67e22; font-weight: 600;">💡 텍스트를 비우고 저장하면 내용이 완전히 삭제됩니다.</span>
                    <button class="btn-save" onclick="saveData()">리포트판에 저장</button>
                </div>
            </div>
        </div>

        <div style="text-align: right; margin-bottom: 16px;">
            <button class="btn-print" onclick="window.print()">
                🖨️ 주간보고서 인쇄하기
            </button>
        </div>

        <div class="report-paper">
            <div class="rep-header">
                <div class="rep-title">전국전력노동조합 주간업무</div>
                <div class="rep-date">2026. 06. 15 ~ 06. 19</div>
            </div>

            <div class="rep-section this-week">
                <div class="rep-section-title">■ 이번 주 활동</div>
                <div class="rep-card-box" id="thisWeekContainer"></div>
            </div>

            <div class="rep-section last-week">
                <div class="rep-section-title">■ 지난 주 활동</div>
                <div class="rep-card-box" id="lastWeekContainer"></div>
            </div>

            <div class="rep-footer">
                <span>발행 | 전국전력노동조합 복지국</span>
                <span style="font-weight: normal; font-size: 11px; opacity: 0.6;">전국전력노동조합 제24대 집행부 내부문서</span>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDUFwsNEBzTZxr8EJuY2BZkYTEBadQoMk8",
            authDomain: "knewu-64318.firebaseapp.com",
            databaseURL: "https://knewu-64318-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "knewu-64318",
            storageBucket: "knewu-64318.firebasestorage.app",
            messagingSenderId: "301755569133",
            appId: "1:301755569133:web:9bd85133d084c041368de4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('official_weekly_report_2026');

        const DEPTS_ORDER = ["조직", "복지", "산안", "교문", "총무", "기획", "정책"];
        let serverData = { thisWeek: {}, lastWeek: {} };

        // 부서나 주기가 바뀔 때 입력창 활성화 및 기존 텍스트 로드 제어
        function updateDeptPanel() {
            const period = document.getElementById('inputPeriod').value;
            const dept = document.getElementById('inputDept').value;
            const formBlock = document.getElementById('inputFormBlock');
            const textarea = document.getElementById('textContent');

            if (!dept) {
                formBlock.classList.add('disabled-content');
                textarea.value = '';
                return;
            }

            formBlock.classList.remove('disabled-content');
            textarea.value = serverData[period]?.[dept] || '';
        }
        
        function saveData() {
            const period = document.getElementById('inputPeriod').value;
            const dept = document.getElementById('inputDept').value;
            const text = document.getElementById('textContent').value.trim();

            // 🚨 텍스트가 비어있으면 해당 경로를 완전히 삭제(remove)
            if (text === "") {
                dbRef.child(period).child(dept).remove().then(() => {
                    alert(`${dept}국의 내용이 삭제되었습니다.`);
                    document.getElementById('inputDept').value = "";
                    updateDeptPanel();
                });
            } else {
                dbRef.child(period).child(dept).set(text).then(() => {
                    alert("리포트 보드에 정상 등록되었습니다.");
                    document.getElementById('inputDept').value = "";
                    updateDeptPanel();
                });
            }
        }

        function directBlurUpdate(period, dept, element) {
            const updatedText = element.innerText.trim();
            if (updatedText === "") {
                dbRef.child(period).child(dept).remove();
            } else {
                dbRef.child(period).child(dept).set(updatedText);
            }
        }

        function renderReportView() {
            const thisContainer = document.getElementById('thisWeekContainer');
            const lastContainer = document.getElementById('lastWeekContainer');

            thisContainer.innerHTML = '';
            lastContainer.innerHTML = '';

            // 1. 이번주 활동 렌더링
            let thisCount = 0;
            DEPTS_ORDER.forEach(dept => {
                const text = serverData.thisWeek?.[dept] || '';
                if (text) {
                    thisCount++;
                    thisContainer.innerHTML += `
                        <div class="rep-item">
                            <div class="dept-badge">${dept}</div>
                            <div class="dept-content" contenteditable="true" onblur="directBlurUpdate('thisWeek', '${dept}', this)">${text}</div>
                        </div>
                    `;
                }
            });
            if (thisCount === 0) thisContainer.innerHTML = '<div class="no-data-text">이번 주 활동 계획이 비어있습니다.</div>';

            // 2. 지난주 활동 렌더링
            let lastCount = 0;
            DEPTS_ORDER.forEach(dept => {
                const text = serverData.lastWeek?.[dept] || '';
                if (text) {
                    lastCount++;
                    lastContainer.innerHTML += `
                        <div class="rep-item">
                            <div class="dept-badge">${dept}</div>
                            <div class="dept-content" contenteditable="true" onblur="directBlurUpdate('lastWeek', '${dept}', this)">${text}</div>
                        </div>
                    `;
                }
            });
            if (lastCount === 0) lastContainer.innerHTML = '<div class="no-data-text">지난 주 활동 내역이 비어있습니다.</div>';
        }

        dbRef.on('value', (snapshot) => {
            serverData = snapshot.val() || { thisWeek: {}, lastWeek: {} };
            renderReportView();
            // 데이터가 실시간으로 바뀔 때 입력창 텍스트도 동기화 유지
            const period = document.getElementById('inputPeriod').value;
            const dept = document.getElementById('inputDept').value;
            if (dept) {
                document.getElementById('textContent').value = serverData[period]?.[dept] || '';
            }
        });
    </script>
</body>
</html>

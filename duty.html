<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주간업무 및 출장·근태 관리 · 전력노조 집행부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <style>
        :root {
            --accent: #1a73e8;
            --accent-dk: #1557b0;
            --ink: #202124;
            --ink-soft: #5f6368;
            --line: #dadce0;
            --line-soft: #e8eaed;
            --canvas: #ffffff;
            --page: #f1f3f4;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: var(--page);
            color: var(--ink);
            padding-bottom: 60px;
        }

        /* ── 상단 바 ── */
        .topbar {
            background: var(--canvas);
            border-bottom: 1px solid var(--line);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--ink-soft);
            font-size: 14px;
            font-weight: 600;
            padding: 7px 12px;
            border-radius: 8px;
            transition: background .15s;
        }
        .back-btn:hover { background: var(--line-soft); }
        .topbar .crumb { font-size: 14px; font-weight: 700; color: var(--ink); }
        .topbar .crumb .sep { color: var(--line); margin: 0 8px; }

        .wrap { max-width: 1000px; margin: 0 auto; padding: 28px 24px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 22px;
        }
        .title-group h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .title-group .sub { margin-top: 4px; font-size: 13px; color: var(--ink-soft); }

        .btn-print {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--canvas);
            color: var(--accent);
            border: 1px solid var(--line);
            padding: 9px 18px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }
        .btn-print:hover { background: #f8fbff; }

        /* ── 부서 선택 탭 ── */
        .dept-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .tab-btn {
            padding: 10px 16px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            background: var(--canvas);
            border: 1px solid var(--line);
            border-radius: 8px;
            cursor: pointer;
            color: var(--ink-soft);
            white-space: nowrap;
        }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* ── 입력 패널 ── */
        .panel {
            background: var(--canvas);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .panel-section-title {
            font-size: 15px;
            font-weight: 700;
            border-left: 4px solid var(--accent);
            padding-left: 8px;
            margin-bottom: 12px;
        }
        
        textarea {
            width: 100%; height: 120px; padding: 12px;
            font-family: inherit; font-size: 14px;
            border: 1px solid var(--line); border-radius: 8px; resize: vertical;
        }

        .btn-save {
            background: var(--accent); color: white; border: none;
            padding: 10px 20px; font-size: 14px; font-weight: 700;
            border-radius: 6px; cursor: pointer; align-self: flex-end;
        }
        .btn-save:hover { background: var(--accent-dk); }

        /* 출장근태 입력 양식 레이아웃 */
        .schedule-form {
            background: var(--page);
            padding: 16px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .form-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 14px;
        }
        .radio-group { display: flex; gap: 14px; font-weight: 600; }
        .radio-group input { margin-right: 4px; cursor: pointer; }
        
        input[type="date"], input[type="text"] {
            padding: 8px 12px; font-family: inherit; font-size: 14px;
            border: 1px solid var(--line); border-radius: 6px; background: white;
        }
        input[type="text"] { flex: 1; min-width: 250px; }
        
        .btn-add {
            background: #202124; color: white; border: none;
            padding: 9px 18px; font-weight: 700; border-radius: 6px; cursor: pointer;
        }
        .btn-add:hover { background: #000; }

        /* 등록 리스트 출력 */
        .item-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            background: white; border: 1px solid var(--line);
            padding: 8px 12px; border-radius: 6px; font-size: 13px;
        }
        .list-item .type-tag {
            font-weight: 700; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 6px;
        }
        .list-item .type-tag.출장 { background: #e3f2fd; color: #0d47a1; }
        .list-item .type-tag.근태 { background: #fce4ec; color: #c2185b; }
        .list-item .del-btn { color: #d93025; cursor: pointer; font-weight: 700; margin-left: 10px; }

        /* ── 취합 현황판 테이블 스타일 ── */
        .preview-section { background: var(--canvas); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px; }
        
        .preview-title-wrap {
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;
        }
        .preview-title-wrap img { width: 32px; height: 32px; object-fit: contain; }
        .preview-title { font-size: 18px; font-weight: 800; color: var(--ink); }
        
        .preview-table { width: 100%; border-collapse: collapse; }
        .preview-table th, .preview-table td { border: 1px solid var(--line); padding: 14px; font-size: 14px; vertical-align: top; }
        .preview-table th { background: var(--page); font-weight: 700; text-align: center; width: 15%; }
        .preview-table td { white-space: pre-wrap; line-height: 1.6; }
        
        /* 보고서용 출장/근태 소섹션 */
        .report-sub-block { margin-top: 8px; padding-top: 6px; border-top: 1px dashed var(--line); font-size: 13px; }
        .report-sub-block strong { font-weight: 700; }
        .report-sub-block.biz { color: #1a73e8; }
        .report-sub-block.vac { color: #b06000; }

        /* ── 🖨️ 인쇄 전용 스타일 (축구장 여백 파괴, A4 1장 타겟팅 초압축) ── */
        @media print {
            @page { size: A4 portrait; margin: 10mm 12mm; }
            body { background: #fff; padding: 0; min-height: 0; }
            .topbar, .dept-tabs, .panel, .btn-print, header, .del-btn, .schedule-form { display: none !important; }
            .wrap { padding: 0; max-width: none; width: 100%; }
            .preview-section { border: none; padding: 0; background: #fff; }
            
            .preview-title-wrap { margin-bottom: 15px; gap: 8px; }
            .preview-title-wrap img { width: 26px; height: 26px; display: inline-block !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .preview-title { font-size: 16pt; font-weight: 900; color: #000 !important; }
            
            .preview-table { width: 100%; margin: 0; table-layout: fixed; }
            .preview-table th, .preview-table td { 
                padding: 6px 8px !important; 
                font-size: 10pt !important; 
                line-height: 1.4 !important; 
                word-break: break-all;
                border: 1px solid #444 !important;
                height: auto !important; /* 고정 높이 강제 제거 */
            }
            .preview-table th { 
                background: #f2f2f2 !important; 
                font-weight: bold; 
                text-align: center; 
                width: 90px !important; /* 부서 칸 너비 */
                vertical-align: middle !important;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .preview-table td { color: #000 !important; }
            .report-sub-block { margin-top: 4px; padding-top: 4px; font-size: 9.5pt !important; color: #000 !important; border-top: 1px dotted #888 !important; }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <a class="back-btn" href="index.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            업무포털
        </a>
        <span class="crumb">집행부 업무포털 <span class="sep">/</span> 주간업무 및 출장·근태</span>
    </div>

    <div class="wrap">
        <header>
            <div class="title-group">
                <h1>주간업무 및 출장·근태 관리</h1>
                <div class="sub">7개 실국별 다음주 주간계획 및 범위 지정 근태 등록 시스템</div>
            </div>
            <button class="btn-print" onclick="window.print()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                주간보고서 인쇄
            </button>
        </header>

        <div class="dept-tabs" id="deptTabs"></div>

        <div class="panel">
            <h2 id="currentDeptTitle" style="font-size: 18px; font-weight: 800; color: var(--accent);">부서</h2>
            
            <div>
                <div class="panel-section-title">다음주 주요 업무계획</div>
                <textarea id="workInput" placeholder="진행될 주요 업무 계획을 자유롭게 입력해 주세요."></textarea>
                <div style="display:flex; justify-content:flex-end; margin-top:8px;">
                    <button class="btn-save" onclick="saveWork()">업무계획 저장</button>
                </div>
            </div>

            <div>
                <div class="panel-section-title">출장 및 근태 현황 등록 (기간 지정 가능)</div>
                <div class="schedule-form">
                    <div class="form-row">
                        <div class="radio-group">
                            <label><input type="radio" name="sType" value="출장" checked> 🏃 출장</label>
                            <label><input type="radio" name="sType" value="근태"> 📄 근태 (휴가/반차 등)</label>
                        </div>
                    </div>
                    <div class="form-row">
                        <label>기간 지정:</label>
                        <input type="date" id="startDate">
                        <span>~</span>
                        <input type="date" id="endDate">
                    </div>
                    <div class="form-row">
                        <input type="text" id="scheduleText" placeholder="세부 내용 입력 (예: 위원장 - 한전 본사 국회대응 출장 / 총무국장 - 연차)">
                        <button class="btn-add" onclick="addSchedule()">일정 추가</button>
                    </div>
                </div>
                <div class="item-list" id="deptScheduleList"></div>
            </div>
        </div>

        <div class="preview-section">
            <div class="preview-title-wrap">
                <img src="https://knewu.netlify.app/icon-192.png" alt="전력노조 로고">
                <div class="preview-title">제24대 집행부 주간업무 및 출장·근태 현황</div>
            </div>
            <table class="preview-table">
                <thead>
                    <tr>
                        <th style="width:90px;">실·국별</th>
                        <th>주요 업무 계획 및 출장 · 근태 현황</th>
                    </tr>
                </thead>
                <tbody id="previewTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDUFwsNEBzTZxr8EJuY2BZkYTEBadQoMk8",
            authDomain: "knewu-64318.firebaseapp.com",
            databaseURL: "https://knewu-64318-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "knewu-64318",
            storageBucket: "knewu-64318.firebasestorage.app",
            messagingSenderId: "301755569133",
            appId: "1:301755569133:web:9bd85133d084c041368de4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('weekly_reports_2026');

        const DEPTS = ["총무국", "조직쟁의실", "기획국", "정책국", "복지국", "산업안전국", "교육문화국"];
        let currentDept = DEPTS[0];
        let globalData = {};

        function initTabs() {
            const tabsContainer = document.getElementById('deptTabs');
            tabsContainer.innerHTML = DEPTS.map((dept, idx) => `
                <button class="tab-btn ${idx === 0 ? 'active' : ''}" onclick="switchDept('${dept}', this)">${dept}</button>
            `).join('');
            updateDeptPanel();
        }

        function switchDept(dept, btnEl) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            currentDept = dept;
            updateDeptPanel();
        }

        function updateDeptPanel() {
            document.getElementById('currentDeptTitle').innerText = `🏢 ${currentDept} 시스템 구성`;
            const deptData = globalData[currentDept] || {};
            document.getElementById('workInput').value = deptData.work || '';

            const listEl = document.getElementById('deptScheduleList');
            listEl.innerHTML = '';
            
            if (deptData.schedules) {
                Object.keys(deptData.schedules).forEach(key => {
                    const item = deptData.schedules[key];
                    const period = item.start === item.end ? item.start : `${item.start} ~ ${item.end}`;
                    listEl.innerHTML += `
                        <div class="list-item">
                            <span><span class="type-tag ${item.type}">${item.type}</span> [${period}] ${item.text}</span>
                            <span class="del-btn" onclick="deleteSchedule('${key}')">× 삭제</span>
                        </div>
                    `;
                });
            }
        }

        function saveWork() {
            const text = document.getElementById('workInput').value;
            dbRef.child(currentDept).child('work').set(text).then(() => {
                alert(`${currentDept} 업무계획이 임시 저장되었습니다.`);
            });
        }

        function addSchedule() {
            const type = document.querySelector('input[name="sType"]:checked').value;
            const start = document.getElementById('startDate').value;
            let end = document.getElementById('endDate').value;
            const text = document.getElementById('scheduleText').value;

            if (!start || !text) {
                alert('시작 날짜와 세부 내용을 반드시 입력해 주세요.');
                return;
            }
            if (!end) end = start;

            if (new Date(start) > new Date(end)) {
                alert('종료일은 시작일보다 빠를 수 없습니다.');
                return;
            }

            const newRef = dbRef.child(currentDept).child('schedules').push();
            newRef.set({ type, start, end, text }).then(() => {
                document.getElementById('scheduleText').value = '';
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
            });
        }

        function deleteSchedule(key) {
            if (confirm('해당 명단의 일정을 삭제하시겠습니까?')) {
                dbRef.child(currentDept).child('schedules').child(key).remove();
            }
        }

        function initFirebaseRealtime() {
            dbRef.on('value', (snapshot) => {
                globalData = snapshot.val() || {};
                updateDeptPanel();

                const tbody = document.getElementById('previewTableBody');
                tbody.innerHTML = '';

                DEPTS.forEach(dept => {
                    const deptData = globalData[dept] || {};
                    const workText = deptData.work ? deptData.work : `<span style="color:#aaa;">- 주요 업무 계획 미입력</span>`;
                    
                    let bizHTML = '';
                    let vacHTML = '';

                    if (deptData.schedules) {
                        const sList = Object.values(deptData.schedules).sort((a, b) => new Date(a.start) - new Date(b.start));
                        
                        // 1. [출장 현황] 가로 컴팩트 나열로 변경 (세로 낭비 제거)
                        const bizItems = sList.filter(s => s.type === '출장');
                        if (bizItems.length > 0) {
                            const bizStrings = bizItems.map(s => {
                                const period = s.start === s.end ? s.start.slice(5) : `${s.start.slice(5)}~${s.end.slice(5)}`;
                                return `[${period}] ${s.text}`;
                            });
                            bizHTML = `<div class="report-sub-block biz"><strong>🏃 [출장]</strong> ${bizStrings.join(', ')}</div>`;
                        }

                        // 2. [근태 현황] 가로 컴팩트 나열로 변경 (세로 낭비 제거)
                        const vacItems = sList.filter(s => s.type === '근태');
                        if (vacItems.length > 0) {
                            const vacStrings = vacItems.map(s => {
                                const period = s.start === s.end ? s.start.slice(5) : `${s.start.slice(5)}~${s.end.slice(5)}`;
                                return `[${period}] ${s.text}`;
                            });
                            vacHTML = `<div class="report-sub-block vac"><strong>📄 [근태]</strong> ${vacStrings.join(', ')}</div>`;
                        }
                    }

                    tbody.innerHTML += `
                        <tr>
                            <th style="text-align:center; font-weight:bold; vertical-align:middle;">${dept}</th>
                            <td>
                                <div style="font-weight:500;">${workText}</div>
                                ${bizHTML}
                                ${vacHTML}
                            </td>
                        </tr>
                    `;
                });
            });
        }

        initTabs();
        initFirebaseRealtime();
    </script>
</body>
</html>

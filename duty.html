<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주간업무 및 출장·근태 통합관리 · 전력노조</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <style>
        :root {
            --accent: #1a73e8;
            --accent-dk: #1557b0;
            --ink: #202124;
            --ink-soft: #5f6368;
            --line: #cbd5e1;
            --line-black: #000000;
            --canvas: #ffffff;
            --page: #f1f3f4;
            --radius: 12px;
            --biz-tint: #e8f0fe;
            --vac-tint: #f1f3f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Malgun Gothic', -apple-system, sans-serif;
            background-color: var(--page); color: var(--ink); padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── 상단 바 ── */
        .topbar {
            background: var(--canvas); border-bottom: 1px solid var(--line);
            padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 14px;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
            color: var(--ink-soft); font-size: 14px; font-weight: 600; padding: 7px 12px; border-radius: 8px;
            transition: background .15s;
        }
        .back-btn:hover { background: var(--page); }
        .topbar .crumb { font-size: 14px; font-weight: 700; color: var(--ink); }

        .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

        /* ── 입력 컨트롤러 대시보드 ── */
        .panel {
            background: var(--canvas); border: 1px solid var(--line); border-radius: var(--radius);
            padding: 22px; margin-bottom: 24px; display: flex; flex-direction: column; gap: 18px;
        }
        .panel-title { font-size: 15px; font-weight: 700; border-left: 4px solid var(--accent); padding-left: 8px; }

        /* 직책 전용 네모칸 단추 배치 */
        .member-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .member-btn {
            padding: 10px 18px; font-family: inherit; font-size: 14.5px; font-weight: 700;
            background: #f8fafc; border: 1px solid var(--line); border-radius: 8px;
            color: #475569; cursor: pointer; transition: all 0.12s;
        }
        .member-btn:hover { background: #f1f5f9; }
        .member-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .disabled-content { opacity: 0.18; pointer-events: none; }

        /* 양식 세부 그리드 */
        .form-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 20px; }
        @media (max-width: 850px) { .form-grid { grid-template-columns: 1fr; } }

        textarea {
            width: 100%; height: 110px; padding: 12px; font-family: inherit; font-size: 14px;
            border: 1px solid var(--line); border-radius: 8px; resize: none; line-height: 1.5;
        }
        textarea:focus { outline: 2px solid var(--accent); }

        /* 📅 월~일 7일 직관적 다중 토글 달력 */
        .cal-selector-box { background: #f8fafc; border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
        .radio-inline { display: flex; gap: 16px; margin-bottom: 10px; font-size: 14px; font-weight: 700; }
        .radio-inline input { margin-right: 4px; cursor: pointer; }
        
        .days-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-node {
            background: white; border: 1px solid var(--line); border-radius: 6px;
            padding: 9px 2px; text-align: center; cursor: pointer; user-select: none;
        }
        .day-node .n-w { font-size: 13px; font-weight: 800; color: #1e293b; }
        .day-node .n-d { font-size: 10.5px; color: #64748b; margin-top: 1px; }
        .day-node.active { background: #2563eb !important; border-color: #2563eb; }
        .day-node.active * { color: white !important; }

        .btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .btn-submit { background: var(--accent); color: white; border: none; font-weight: 700; cursor: pointer; padding: 10px 20px; border-radius: 6px; }
        .btn-submit:hover { background: var(--accent-dk); }
        .btn-clear { background: #ea580c; color: white; border: none; font-weight: 700; cursor: pointer; padding: 10px 14px; border-radius: 6px; }

        .btn-print {
            display: inline-flex; align-items: center; gap: 7px; background: var(--canvas); color: var(--accent);
            border: 1px solid var(--line); padding: 10px 20px; border-radius: 999px; font-size: 14px; font-weight: 600;
            cursor: pointer; box-shadow: 0 1px 3px rgba(60,64,67,.08);
        }
        .btn-print:hover { background: #f8fbff; }

        /* ── 📄 진짜 인쇄용 공인 서식 보드 (여름휴가 시스템 매칭) ── */
        .doc-page-belt { display: flex; flex-direction: column; gap: 40px; }
        .page-sheet { background: var(--canvas); border: 1px solid var(--line-black); padding: 40px 45px; }
        .sheet-title { text-align: center; font-size: 24px; font-weight: 800; text-decoration: underline; margin-bottom: 24px; color: #000; }
        
        /* 1) 상단 주요 업무 추진계획 표 서식 */
        .report-table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 10px; }
        .report-table th, .report-table td { border: 1px solid var(--line-black); padding: 9px 11px; font-size: 14px; vertical-align: top; color: #000; }
        .report-table th { background: #fdd7cc; font-weight: 700; text-align: center; vertical-align: middle; }
        .report-table td.center-lbl { text-align: center; vertical-align: middle; font-weight: 700; background: #fafafa; }
        .report-table td.txt-cell { white-space: pre-wrap; line-height: 1.6; font-weight: 500; }

        /* 2) 하단 주간 출장·근태 격자 현황판 서식 */
        .grid-table { width: 100%; border-collapse: collapse; table-layout: fixed; text-align: center; }
        .grid-table th, .grid-table td { border: 1px solid var(--line-black); padding: 5px 2px; font-size: 13px; height: 42px; vertical-align: middle; color: #000; }
        .grid-table th { background: #d9e1f2; font-weight: 700; }
        .grid-table td.m-name { font-weight: 700; background: #fff; }
        
        /* 현황판 셀 내부 한정 스타일 정의 */
        .badge-cell { font-size: 11.5px; font-weight: 700; line-height: 1.35; outline: none; }
        .badge-cell.출장 { background: var(--biz-tint) !important; color: #1967d2 !important; }
        .badge-cell.근태 { background: var(--vac-tint) !important; color: #5f6368 !important; }

        /* ── 🖨️ 인쇄 제어 매커니즘 ── */
        @media print {
            @page { size: A4 portrait; margin: 12mm; }
            body { background: #fff; padding: 0; color: #000 !important; }
            .topbar, .panel, .btn-print { display: none !important; }
            .wrap { max-width: none; width: 100%; padding: 0; }
            .page-sheet { border: none; padding: 0; background: #fff; page-break-after: always; break-after: page; box-shadow: none; }
            .page-sheet:last-child { page-break-after: auto; break-after: auto; }
            
            .report-table th { background: #fdd7cc !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .grid-table th { background: #d9e1f2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .badge-cell.출장 { background: var(--biz-tint) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .badge-cell.근태 { background: var(--vac-tint) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <a class="back-btn" href="index.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            업무포털
        </a>
        <span class="crumb">집행부 업무포털 <span class="sep">/</span> 주간계획 및 현황 관리</span>
    </div>

    <div class="wrap">
        
        <div class="panel">
            <div class="panel-title">👤 성명(직책) 선택</div>
            <div class="member-grid" id="memberBtnZone"></div>

            <div id="inputFormBlock" class="disabled-content">
                <div class="form-grid">
                    
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label style="font-size:13px; font-weight:700;" id="lblWorkTitle">✍️ 업무계획 기재</label>
                        <textarea id="txWork" placeholder="주요 업무 추진 계획 내용을 입력하세요."></textarea>
                    </div>

                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label style="font-size:13px; font-weight:700;">📅 출장 · 근태 요일 다중 선택</label>
                        <div class="cal-selector-box">
                            <div class="radio-inline">
                                <label><input type="radio" name="scType" value="출장" checked> 🏃 출장</label>
                                <label><input type="radio" name="scType" value="근태"> 📄 근태</label>
                            </div>
                            
                            <div class="days-row">
                                <div class="day-node" data-w="월" onclick="toggleDayNode('월')"><div class="n-w">월</div><div class="n-d" id="cd-월"></div></div>
                                <div class="day-node" data-w="화" onclick="toggleDayNode('화')"><div class="n-w">화</div><div class="n-d" id="cd-화"></div></div>
                                <div class="day-node" data-w="수" onclick="toggleDayNode('수')"><div class="n-w">수</div><div class="n-d" id="cd-수"></div></div>
                                <div class="day-node" data-w="목" onclick="toggleDayNode('목')"><div class="n-w">목</div><div class="n-d" id="cd-목"></div></div>
                                <div class="day-node" data-w="금" onclick="toggleDayNode('금')"><div class="n-w">금</div><div class="n-d" id="cd-금"></div></div>
                                <div class="day-node" data-w="토" onclick="toggleDayNode('토')"><div class="n-w">토</div><div class="n-d" id="cd-토"></div></div>
                                <div class="day-node" data-w="일" onclick="toggleDayNode('일')"><div class="n-w">일</div><div class="n-d" id="cd-일"></div></div>
                            </div>

                            <input type="text" id="txScDetail" style="width:100%; margin-top:10px; padding:9px; font-size:13px; border:1px solid var(--line); border-radius:6px;" placeholder="상세 사유 기재 (예: 본사 국회대응 출장 / 연차휴가)">
                        </div>
                    </div>

                </div>

                <div class="btn-row">
                    <button class="btn-clear" onclick="clearDataForMember()">🔥 정보 전체 초기화(삭제)</button>
                    <button class="btn-submit" onclick="saveDataToServer()">통합 내용 저장</button>
                </div>
            </div>
        </div>

        <div style="text-align: right; margin-bottom: 20px;">
            <button class="btn-print" onclick="window.print()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                지정 양식 보고서 인쇄 (A4 세로 마감)
            </button>
        </div>

        <div class="doc-page-belt">
            
            <div class="page-sheet">
                <div class="sheet-title" id="printTitle1">주간업무 계획 보고</div>
                <table class="report-table">
                    <thead>
                        <tr>
                            <th style="width: 14%;">처/실</th>
                            <th style="width: 14%;">국/과</th>
                            <th style="width: 60%;">주 요 내 용</th>
                            <th style="width: 12%;">비 고</th>
                        </tr>
                    </thead>
                    <tbody id="domWorkBody"></tbody>
                </table>
            </div>

            <div class="page-sheet">
                <div class="sheet-title" id="printTitle2">집행부 주간 출장 · 근태 현황</div>
                <table class="grid-table">
                    <thead>
                        <tr>
                            <th style="width: 12%;">성명</th>
                            <th style="width: 14%;">직책</th>
                            <th id="th-월">월</th>
                            <th id="th-화">화</th>
                            <th id="th-수">수</th>
                            <th id="th-목">목</th>
                            <th id="th-금">금</th>
                            <th id="th-토">토</th>
                            <th id="th-일">일</th>
                        </tr>
                    </thead>
                    <tbody id="domGridBody"></tbody>
                </table>
            </div>

        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDUFwsNEBzTZxr8EJuY2BZkYTEBadQoMk8",
            authDomain: "knewu-64318.firebaseapp.com",
            databaseURL: "https://knewu-64318-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "knewu-64318",
            storageBucket: "knewu-64318.firebasestorage.app",
            messagingSenderId: "301755569133",
            appId: "1:301755569133:web:9bd85133d084c041368de4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('perfect_clean_report_2026');

        // 요청하신 2글자 단축 구조 10인 명단
        const MEMBERS = ["총무", "조직", "기획", "정책", "복지", "산안", "교문", "홍部", "김次", "이課"];
        const WEEKS = ["월", "화", "수", "목", "금", "토", "일"];

        let selectedUser = "";
        let serverCache = {};
        let activeDays = [];
        let dateStrings = {};

        // 날짜 주간 자동 트래킹 엔진
        function calculateWeeklyDates() {
            const current = new Date();
            const currentDay = current.getDay();
            const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
            
            const monday = new Date(current);
            monday.setDate(current.getDate() + distanceToMonday);

            WEEKS.forEach((w, idx) => {
                const target = new Date(monday);
                target.setDate(monday.getDate() + idx);
                const m = target.getMonth() + 1;
                const d = target.getDate();
                dateStrings[w] = `${m}/${d}`;
                
                document.getElementById(`cd-${w}`).innerText = `${m}/${d}`;
                document.getElementById(`th-${w}`).innerText = `${m}/${d}(${w})`;
            });

            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            const periodStr = `(${monday.getFullYear()}. ${monday.getMonth()+1}. ${monday.getDate()} ~ ${sunday.getMonth()+1}. ${sunday.getDate()})`;
            
            document.getElementById('printTitle1').innerText = `주간업무 추진계획 ${periodStr}`;
            document.getElementById('printTitle2').innerText = `집행부 주간 출장 · 근태 현황 ${periodStr}`;
        }

        function initApp() {
            calculateWeeklyDates();
            const zone = document.getElementById('memberBtnZone');
            zone.innerHTML = MEMBERS.map(m => `
                <button class="member-btn" id="b-mem-${m}" onclick="clickMemberBtn('${m}')">${m}</button>
            `).join('');
        }

        function clickMemberBtn(m) {
            document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`b-mem-${m}`).classList.add('active');

            selectedUser = m;
            document.getElementById('inputFormBlock').classList.remove('disabled-content');
            document.getElementById('lblWorkTitle').innerText = `✍️ [${m}] 주요 업무계획 입력`;

            const data = serverCache[m] || {};
            document.getElementById('txWork').value = data.work || '';
            document.getElementById('txScDetail').value = '';
            activeDays = [];
            refreshDayNodesUI();
        }

        function toggleDayNode(day) {
            const idx = activeDays.indexOf(day);
            if(idx > -1) activeDays.splice(idx, 1);
            else activeDays.push(day);
            refreshDayNodesUI();
        }

        function refreshDayNodesUI() {
            document.querySelectorAll('.day-node').forEach(node => {
                const w = node.getAttribute('data-w');
                node.className = activeDays.includes(w) ? 'day-node active' : 'day-node';
            });
        }

        function saveDataToServer() {
            if(!selectedUser) return;
            const work = document.getElementById('txWork').value.trim();
            const scType = document.querySelector('input[name="scType"]:checked').value;
            const scDetail = document.getElementById('txScDetail').value.trim();

            dbRef.child(selectedUser).child('work').set(work);

            if(activeDays.length > 0 && scDetail) {
                const daysObj = serverCache[selectedUser]?.days || {};
                activeDays.forEach(w => {
                    daysObj[w] = { type: scType, text: scDetail };
                });
                dbRef.child(selectedUser).child('days').set(daysObj);
            }

            alert(`${selectedUser} 정보가 실시간 반영되었습니다.`);
            activeDays = [];
            document.getElementById('txScDetail').value = '';
            refreshDayNodesUI();
        }

        function clearDataForMember() {
            if(!selectedUser) return;
            if(confirm(`[${selectedUser}]의 이번 주 모든 데이터(업무계획+출장근태)를 삭제하시겠습니까?`)) {
                dbRef.child(selectedUser).remove().then(() => {
                    alert("정상 삭제 처리되었습니다.");
                    document.getElementById('txWork').value = '';
                    document.getElementById('txScDetail').value = '';
                    activeDays = [];
                    refreshDayNodesUI();
                });
            }
        }

        function removeDayLive(user, day) {
            dbRef.child(user).child('days').child(day).remove();
        }

        function drawReportSheets() {
            // 1. 주요업무 요약본 드로잉 (사무처 / 기획처 대분류 바인딩)
            const workBody = document.getElementById('domWorkBody');
            workBody.innerHTML = '';
            let officeRendered = false;
            let planningRendered = false;

            MEMBERS.forEach(m => {
                const data = serverCache[m] || {};
                const workText = data.work || '';

                let leftTd = '';
                if(m === "총무" || m === "조직") {
                    if(!officeRendered) { leftTd = `<td rowspan="2" class="center-lbl">사 무 처</td>`; officeRendered = true; }
                } else if(m === "교문") {
                    leftTd = `<td class="center-lbl">대외협력</td>`;
                } else {
                    if(!planningRendered) { leftTd = `<td rowspan="${MEMBERS.length - 3}" class="center-lbl">기 획 처</td>`; planningRendered = true; }
                }

                workBody.innerHTML += `
                    <tr>
                        ${leftTd}
                        <td class="center-lbl">${m}</td>
                        <td class="txt-cell">${workText ? workText : '<span style="color:#ccc;">- 주요 내용 미입력</span>'}</td>
                        <td></td>
                    </tr>
                `;
            });

            // 2. 10인 격자 현황판 드로잉 (더블클릭 개별 삭제 유지)
            const gridBody = document.getElementById('domGridBody');
            gridBody.innerHTML = '';

            MEMBERS.forEach(m => {
                let row = `<tr><td class="m-name">${m}</td><td style="font-weight:600; background:#fafafa;">국장급</td>`;
                
                WEEKS.forEach(w => {
                    const deptData = serverCache[m] || {};
                    const sc = deptData.days?.[w];

                    if(sc) {
                        row += `<td class="badge-cell ${sc.type}" title="더블클릭 시 삭제" dblclick="removeDayLive('${m}', '${w}')">${sc.type}<br>${sc.text}</td>`;
                    } else {
                        row += `<td></td>`;
                    }
                });

                row += `</tr>`;
                gridBody.innerHTML += row;
            });
        }

        dbRef.on('value', (snapshot) => {
            serverCache = snapshot.val() || {};
            drawReportSheets();
            
            if(selectedUser) {
                const data = serverCache[selectedUser] || {};
                document.getElementById('txWork').value = data.work || '';
            }
        });

        initApp();
    </script>
</body>
</html>
